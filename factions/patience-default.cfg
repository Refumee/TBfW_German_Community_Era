	description="<img>src='units/heroes/pr_major.png~SCALE_SHARP(288,288)' align='middle'</img>

"+_"The <bold>text='Patience'</bold> has a faction of winged creatures and supernatural beings that roam the skies beyond the reach of ordinary armies. Unbound by the limitations of the land, their warriors can traverse rivers, mountains, and forests with equal ease, striking where their enemies least expect them.

The strength of Patience lies in its unmatched mobility and resilience. Every unit in the faction is capable of flight and possesses some means of recovering from injury without relying on villages. Some regenerate naturally, while others sustain themselves by draining the life force of their enemies. This allows the faction to remain active far from friendly territory and wage prolonged campaigns without losing momentum.

Though many of their warriors are less durable than traditional frontline troops, their ability to heal while constantly repositioning makes them difficult to pin down and even harder to wear down. Commanders who exploit their mobility will find Patience to be a highly flexible and elusive faction."
[/multiplayer_side]