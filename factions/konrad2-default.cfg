"+_"The <bold>text='Konrad2'</bold> has a faction forged by the wisdom of countless campaigns. Under the leadership of the veteran commander Konrad2, half-orcs, zombie lords, gifted mages, and spirits of the four elements fight together in an army shaped by experience and adaptability.

The strength of Konrad2 lies in its ability to respond to nearly any threat. Elemental spirits embody the powers of fire, water, earth, and air, allowing the faction to adapt to a wide variety of enemies and battlefield conditions. Zombies form expendable ranks that absorb the enemy's attacks, while their leaders strengthen and direct the undead host.

Half-orcs serve as powerful frontline warriors, capable of holding their ground against even the fiercest opponents. Supporting them are exceptionally talented mages whose mastery of the arcane arts is rivaled only by the Nature Weaver, a spellcaster able to heal nearby allies while unleashing potent attacks against the enemy. Though the faction relies on the cooperation of many different forces, its versatility and battlefield experience make it a formidable opponent in any situation."
[/multiplayer_side]