#textdomain wesnoth-gce

#define GCE_ERA_MACRO
	{~add-ons/GCE/factions/patience-default.cfg}
	{~add-ons/GCE/factions/darwybfw-default.cfg}
	{~add-ons/GCE/factions/refumee-default.cfg}
	{~add-ons/GCE/factions/aurelix-default.cfg}
	{~add-ons/GCE/factions/gg45-default.cfg}
	{~add-ons/GCE/factions/lynch-default.cfg}
	{~add-ons/GCE/factions/lighting-default.cfg}
	{~add-ons/GCE/factions/konrad2-default.cfg}
	{~add-ons/GCE/factions/ihmcheck-default.cfg}
	{~add-ons/GCE/factions/heindal-default.cfg}
	{ENABLE_ADVANCEMENT "Rogue Mage" "Arcane Enforcer" ()}
	{ENABLE_ADVANCEMENT Soulless (Running Corpse) (set_experience=80)}
	{ENABLE_WOSE_SHAMAN}
	{ENABLE_SAURIAN_SPEARTHROWER}
	{GLOBAL__UNIVERSAL_AMLAS}
	{EVENTS_FOR_MOOG_ABILITIES}
	{ZOMBIE_INIT_GCE}
	{ZOMBIES_GCE}
	[load_resource]
		id=EoMa_events_resource
	[/load_resource]
	[load_resource]
		id=EoMa_pvp_events_resource
	[/load_resource]
	[load_resource]
		id=gce_pvp_events_resource
	[/load_resource]
#enddef

#define GCE_ERA_RPG_MACRO
	{~add-ons/GCE/factions/rpg/patience-rpg.cfg}
	{~add-ons/GCE/factions/rpg/darwybfw-rpg.cfg}
	{~add-ons/GCE/factions/rpg/refumee-rpg.cfg}
	{~add-ons/GCE/factions/rpg/aurelix-rpg.cfg}
	{~add-ons/GCE/factions/rpg/gg45-rpg.cfg}
	{~add-ons/GCE/factions/rpg/lynch-rpg.cfg}
	{~add-ons/GCE/factions/rpg/lighting-rpg.cfg}
	{~add-ons/GCE/factions/rpg/konrad2-rpg.cfg}
	{~add-ons/GCE/factions/rpg/ihmcheck-rpg.cfg}
	{~add-ons/GCE/factions/rpg/heindal-rpg.cfg}
	{ENABLE_ADVANCEMENT "Rogue Mage" "Arcane Enforcer" ()}
	{ENABLE_ADVANCEMENT Soulless (Running Corpse) (set_experience=80)}
	{ENABLE_WOSE_SHAMAN}
	{ENABLE_SAURIAN_SPEARTHROWER}
	{GLOBAL__UNIVERSAL_AMLAS}
	{EVENTS_FOR_MOOG_ABILITIES}
	[load_resource]
		id=EoMa_events_resource
	[/load_resource]
	[load_resource]
		id=EoMa_pvp_events_resource
	[/load_resource]
	[load_resource]
		id=gce_pvp_events_resource
	[/load_resource]
#enddef

[era]
	id=era_gce
	name= _ "GCE Era"
	require_era=yes
	description=_ "The GCE era for Wesnoth multiplayer."
	
	{RANDOM_SIDE}
	{GCE_ERA_MACRO}
	{QUICK_4MP_LEADERS}
[/era]
[era]
	id=era_gce_default
	name= _ "GCE Era + 1.19 Default"
	require_era=yes
	description=_ "The GCE era and the standard era for Wesnoth multiplayer."

	{ERA_DEFAULT}
	{multiplayer/factions/dunefolk-default.cfg}
	{GCE_ERA_MACRO}
[/era]
[era]
	id=era_gce_rpg
	name= _ "GCE Era RPG"
	require_era=yes
	description=_ "The GCE RPG era for Wesnoth multiplayer."
	
	{RANDOM_SIDE}
	{GCE_ERA_RPG_MACRO}
	{QUICK_4MP_LEADERS}
[/era]