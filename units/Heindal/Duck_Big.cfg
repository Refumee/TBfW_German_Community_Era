#textdomain wesnoth-trader
[unit_type]
    id=Big Duck
    name= _ "Big Duck"
    race=monster
    image="units/animals/duck.png~SCALE(120%,120%)"
    hitpoints=30
    movement_type=naga
    movement=6
    experience=92
    level=2
    alignment=neutral
    advances_to=null
    undead_variation=swimmer
    cost=24
    usage=fighter
    description= _ "A big duck can annoy and distract enemies even more, but still has disadvantages in close combat."
    {DEFENSE_ANIM "units/animals/duck.png~SCALE(120%,120%)" "units/animals/duck.png~SCALE(120%,120%)" mermen-hit.wav}
    
	[attack]
        name=big nagnag
        description= _ "big nag nag"
        type=arcane
        range=ranged
        damage=7
        number=2
        icon=attacks/wail.png
        [specials]
			{WEAPON_SPECIAL_SLOW}
			{WEAPON_SPECIAL_MAGICAL}
        [/specials]
    [/attack]  
	
	[attack]
        name=water blast
        description= _ "water blast"
        type=cold
        range=ranged
        damage=18
        number=1
        icon=attacks/wail.png
    [/attack]  
	
	[attack]
        name=duckbill
        description= _ "duckbill"
        type=impact
        range=melee
        damage=6
        number=1
        icon=attacks/fangs-bug.png
    [/attack]  
    [abilities]
        {ABILITY_SUBMERGE}
    [/abilities]
	
	[attack_anim]
        [filter_attack]
            name=big nagnag
        [/filter_attack]
        [missile_frame]
            begin=-150
            end=0
            image="projectiles/wailprojectile-n-1.png"
            image_diagonal="projectiles/wailprojectile-ne-1.png"
        [/missile_frame]
        [if]
            hits=yes
            [frame]
                begin=-350
                end=-100
                sound=throw-1.wav
            [/frame]
        [/if]
        [else]
            hits=no
            [frame]
                begin=-350
                end=-100
                sound=throw-2.wav
            [/frame]
        [/else]
    [/attack_anim]
	
	
	[attack_anim]
        [filter_attack]
            name=water blast
        [/filter_attack]
        [missile_frame]
            begin=-150
            end=0
            image="projectiles/water-spray.png"
            image_diagonal="projectiles/water-spray.png"
        [/missile_frame]
        [if]
            hits=yes
            [frame]
                begin=-350
                end=-100
                sound=water-blast.wav
            [/frame]
        [/if]
        [else]
            hits=no
            [frame]
                begin=-350
                end=-100
                sound=water-blast.wav
            [/frame]
        [/else]
    [/attack_anim]
[/unit_type]
