#textdomain wesnoth-gce

##################################################################### TRUE ELEMENTALS #####################################################################

[race]
    id=trueelemental
    name= _ "race^True Elemental"
    plural_name= _ "race^True Elementals"
    num_traits=3
    undead_variation=null
    ignore_global_traits=yes
    description=_  "There are a few mage academies over the world which teach a form of magic that calls upon the powers of nature, enabling the mage to summon creatures known as Elementals. What they don't know is that these creatures are but an imitation of the true elementals, created from nature's energy and that of the mage. True elementals are nothing less than the spirits of nature themselves, materialized into the mortal plane with the aid of a true nature mage.
Elementalists must not be blamed for not knowing that, though, for the one with the power to materialize true elementals is still to be born."
    {TRAIT_ELEMENTAL}
[/race]

[movetype]
    name=fireelemental
    [movement_costs]
        shallow_water=4
        swamp_water=3
        reef=3
        flat=1
        sand=1
        forest=1
        hills=1
        mountains=3
        village=1
        castle=1
        cave=1
        frozen=4
        unwalkable=1
        walkable_lava=1
        fungus=2
    [/movement_costs]
    [defense]
        shallow_water=90
        swamp_water=80
        reef=70
        flat=50
        sand=50
        forest=60
        walkable_lava=40
        hills=50
        mountains=60
        village=50
        castle=50
        cave=60
        frozen=80
        unwalkable=50
        fungus=60
    [/defense]
    [resistance]
        blade=80
