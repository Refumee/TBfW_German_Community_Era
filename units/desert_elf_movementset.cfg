#desert elves move fast across the sands, but are not used to forests
#they are also a bit faster in caves
[movetype]
    name=desert_elf
    [movement_costs]
        shallow_water=3
        reef=2
        swamp_water=2
        flat=1
        sand=1
        forest=2
        hills=2
        mountains=3
        village=1
        castle=1
        cave=2
        frozen=3
        fungus=2
    [/movement_costs]
    [vision_costs]
        shallow_water=2
        deep_water=2
        reef=2
        swamp_water=2
        flat=1
        sand=1
        forest=2
        hills=2
        mountains=3
        village=1
        castle=1
        cave=2
        frozen=2
        fungus=2
        unwalkable=2
    [/vision_costs]
    [defense]
        shallow_water=80
        reef=70
        swamp_water=70
        flat=60
        sand=40
        forest=50
        hills=50
        mountains=40
        village=40
        castle=40
        cave=70
        frozen=70
        fungus=50
    [/defense]
    {WOODLAND_RESISTANCE}
[/movetype]
[movetype]
    name=desert_float
    flies=yes
    [movement_costs]
        deep_water={UNREACHABLE}
        shallow_water=1
        reef=1
        swamp_water=1
        flat=1
        sand=1
        forest=2
        hills=1
        mountains=2
        village=1
        castle=1
        cave=1
        unwalkable=2
        frozen=2
        fungus=2
    [/movement_costs]
    [vision_costs]
        shallow_water=1
        deep_water=1
        reef=1
        swamp_water=1
        flat=1
        sand=1
        forest=2
        hills=1
        mountains=2
        village=1
        castle=1
        cave=1
        frozen=2
        fungus=2
        unwalkable=2
    [/vision_costs]
    [defense]
        deep_water=70
        shallow_water=60
        reef=50
        swamp_water=60
        flat=50
        sand=40
        forest=50
        hills=50
        mountains=40
        village=40
        castle=40
        cave=70
        frozen=60
        fungus=50
        unwalkable=70
    [/defense]
    {WOODLAND_RESISTANCE}
[/movetype]

    [movetype]
        name=ship
        flying=yes # not really flying, it just keeps the sprite baseline from shifting up/down on different terrains
        [movement_costs]
            deep_water=1
            shallow_water=2
            swamp_water=2
            reef=3
            village=1
        [/movement_costs]
        [defense]
            deep_water=60
            shallow_water=70
            swamp_water=80
            reef=90
        [/defense]
        [resistance]
            blade=100
            pierce=100
            impact=110
            fire=130
            cold=70
            arcane=40
        [/resistance]
    [/movetype]
    [race]
        id=ship
        help_taxonomy=mechanical
        name= _ "race^Ship"
        plural_name= _ "race+plural^Ships"
        description= _ "Ships are not living beings, but they are crafted and (usually) controlled by living beings. Most ships neither move nor think on their own, but some do so as a result of magical enchantment."
        num_traits=2
        ignore_global_traits=yes
        {TRAIT_MECHANICAL}
        # these need to span elf/human/orc, so a little vague for now.  Maybe this "race" can be split up
        {SHIP_NAMES}
    [/race]