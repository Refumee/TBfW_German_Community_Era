		[/frame]
	[/standing_anim]
	[defend]
		start_time=-126
		[if]
			hits=hit
			offset=0.0~-0.05:126,-0.05~0.0:126
			alpha=0.8~0.5:126,0.5~0.8:126

			hit_sound_start_time=-25
			[hit_sound_frame]
				sound=wail-sml.wav
			[/hit_sound_frame]
		[/if]
		[else]
			hits=kill
			offset=0.0~-0.05:126,-0.05~0.0:126
			alpha=0.8~0.5:126,0.5~0.8:126
		[/else]
		[else]
			hits=miss
			offset=0.0~-0.1:126,-0.1~0.0:126
			alpha=0.8~0.25:126,0.25~0.8:126
		[/else]
		[frame]
			image={PATH_TEMP}.png:1,{PATH_TEMP}.png:250,{PATH_TEMP}.png:1
		[/frame]
	[/defend]

	[attack_anim]
		[filter_attack]
			name=wail
		[/filter_attack]
		{MISSILE_FRAME_WAIL}
		start_time=-250
		[frame]
			image="{PATH_TEMP}.png:50"
		[/frame]
		[frame]
			image="{PATH_TEMP}.png:250"
			sound=wail-sml.wav
		[/frame]
	[/attack_anim]
	[attack_anim]
		[filter_attack]
			name=baneblade
		[/filter_attack]
		alpha=0.8~0.5:126,0.5~0.8:126
		offset=0.0~0.3,0.3~0.45,0.45~0.3,0.3~0.0
		start_time=-250
		[frame]
			image="{PATH_TEMP}.png:[150,100*2,90,80]"
		[/frame]
		{SOUND:HIT_AND_MISS {SOUND_LIST:SWORD_SWISH} {SOUND_LIST:MISS} -100}
		[frame]
			image="{PATH_TEMP}.png:50"
		[/frame]
	[/attack_anim]
#enddef

#define PATH_TEMP
units/heroes/pr_major#enddef

[unit_type]
	id=Patience Major
	name= _ "Major"
	race=undead
	image="{PATH_TEMP}.png"
	hitpoints=23
	movement_type=undeadspirit
	movement=5
	experience=75
	level=2
	alignment=chaotic
	advances_to=Patience Captain
	cost=38
	usage=scout
	[abilities]
		{ABILITY_LEADERSHIP}
	[/abilities]
	description= _ "These shades of what were once warriors are among the most terrifying things a necromancer can create, for a sword will cleave right through them as if through air, seemingly without doing harm. It is the thought that these foes are invincible which is so frightening, a notion that is fortunately far from the truth."
	die_sound=wail-long.wav
	[attack]
		name=baneblade
		description=_"baneblade"
		type=arcane
		range=melee
		damage=6
		number=3
		[specials]
			{WEAPON_SPECIAL_DRAIN}
		[/specials]
	[/attack]
	[attack]
		name=wail
		description=_"wail"
		type=cold
		range=ranged
		damage=4
		number=3
	[/attack]
	{SPIRIT_MAJOR_ANIMATIONS ({PATH_TEMP})}
[/unit_type]
#undef PATH_TEMP

