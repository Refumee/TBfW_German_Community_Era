#textdomain wesnoth-gce
[unit_type]
	id=EMMR_Enchantress
	name= _ "Enchantress"
	race=human
	gender=female
	image="units/lighting/Enchantress.png"
	hitpoints=32
	movement_type=smallfoot
	movement=5
	experience=70
	level=2
	alignment=neutral
	advances_to=EMMR_Sorceress
	cost=20
	usage=healer
	description= _ "Enchantress. Resists arcane. Can heal your units or cure their poison."
	die_sound={SOUND_LIST:HUMAN_FEMALE_DIE}
{DEFENSE_ANIM "units/lighting/Enchantress-defend.png" "units/lighting/Enchantress.png" {SOUND_LIST:HUMAN_FEMALE_HIT} }
	[resistance]
		fire=100
		cold=100
		arcane=90
	[/resistance]
	
	[abilities]
		{ABILITY_EMMR_HEAL}
	[/abilities]
	
	[attack]
		name=whisp_burn
		description=_"whisp burn"
		icon=attacks/EMMR_staff-magic.png
		type=fire
		range=melee
		[specials]
			{WEAPON_SPECIAL_MAGICAL}
		[/specials]
		damage=4
		number=2
	[/attack]

	[attack]
		name=whisp_attack
		description=_"whisp attack"
		icon=attacks/EMMR_staff-magic.png
		type=fire
		range=ranged
		[specials]
			{WEAPON_SPECIAL_MAGICAL}
		[/specials]
		damage=6
		number=3
	[/attack]	
   
	[attack_anim]
		[filter_attack]
			name=whisp_attack
		[/filter_attack]	  
		start_time=-575
		[frame]
			image="units/lighting/Enchantress.png:50"
		[/frame]
		[frame]
			image="units/lighting/Enchantress-attack1.png:100"
		[/frame]
		[frame]
			image="units/lighting/Enchantress-attack[2,1].png:[150,150]"
			sound=wail-sml.wav
		[/frame]
		[frame]
			image="units/lighting/Enchantress.png:75"
		[/frame]
	[/attack_anim]
	
	[attack_anim]
		[filter_attack]
			name=whisp_burn
		[/filter_attack]	  
		start_time=-575
		[frame]
			image="units/lighting/Enchantress.png:50"
		[/frame]
		[frame]
			image="units/lighting/Enchantress-attack[1,2].png:[150,150]"
			sound=wail-sml.wav
		[/frame]
		[frame]
			image="units/lighting/Enchantress.png:75"
		[/frame]
	[/attack_anim]
	
		
[/unit_type]


