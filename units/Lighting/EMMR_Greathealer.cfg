#textdomain wesnoth-gce
[unit_type]
    id=EMMR_Greathealer
    name= _ "Greathealer"
    race=human
    gender=male
    image="units/lighting/EMMR_Greathealer.png"
    hitpoints=42
    movement_type=smallfoot
    movement=5
    experience=90
    level=3
    alignment=neutral
    advances_to=EMMR_Holybeliever
    cost=40
    usage=healer
    description= _ "Greathealer. Resists fire and cold. Weak to pierce. Heals your units up to 6hp or cures poison"
    die_sound={SOUND_LIST:HUMAN_DIE}
{DEFENSE_ANIM "units/lighting/EMMR_Greathealer-defend.png" "units/lighting/EMMR_Greathealer.png" {SOUND_LIST:HUMAN_HIT} }
	[resistance]
		fire=90
		cold=90
		arcane=70
    [/resistance]
	
	[abilities]
		{ABILITY_EMMR_GREAT_HEAL}
	[/abilities]

    [attack]
        name=great_light
        description=_"Great light"
		icon=attacks/EMMR_staff-magic.png
        type=arcane
        range=ranged	
        damage=9
        number=3
    [/attack]	
	
	[attack]
        name=soul_burn
        description=_"Soul burn"
		icon=attacks/EMMR_staff-magic.png
        type=arcane
        range=melee	
        damage=6
        number=2
    [/attack]

	[attack_anim]
        [filter_attack]
            name=soul_burn
        [/filter_attack]      
        start_time=-500
        [frame]
            image="units/lighting/EMMR_Greathealer.png:50"
        [/frame]
        [frame]
            image="units/lighting/EMMR_Greathealer-attack[1,2].png:[250,150]"
            sound=magic-holy-2.ogg
        [/frame]
        [frame]
            image="units/lighting/EMMR_Greathealer.png:50"
        [/frame]
    [/attack_anim]	
	
	[attack_anim]
        [filter_attack]
            name=great_light
        [/filter_attack]      
        start_time=-800
        [frame]
            image="units/lighting/EMMR_Greathealer.png:50"
        [/frame]
        [frame]
            image="units/lighting/EMMR_Greathealer-attack[1~3].png:[250,250,200]"
            sound=magic-holy-2.ogg
        [/frame]
        [frame]
            image="units/lighting/EMMR_Greathealer.png:50"
        [/frame]
    [/attack_anim]   
		
[/unit_type]


