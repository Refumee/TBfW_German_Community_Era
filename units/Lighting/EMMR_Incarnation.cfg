#textdomain wesnoth-gce
[unit_type]
    id=EMMR_Incarnation
    name= _ "Incarnation"
    race=human
    gender=female
    image="units/lighting/EMMR_Incarnation.png"
    hitpoints=94
    movement_type=fly
    movement=5
    experience=150
    level=6
    alignment=neutral
    advances_to=EMMR_Elementalincarnation
    cost=160
    usage=mixed fighter
    description= _ "Incarnation. Resists fire. You are mine!"
    die_sound={SOUND_LIST:HUMAN_FEMALE_DIE}
{DEFENSE_ANIM "units/lighting/EMMR_Incarnation-defend.png" "units/lighting/EMMR_Incarnation.png" {SOUND_LIST:HUMAN_FEMALE_HIT} }
	[resistance]
		fire=40
		cold=100
		arcane=100
    [/resistance]	
	
	[standing_anim]
        start_time=0
        [frame]
            image="units/lighting/EMMR_Incarnation-stand[1~3,2,1,4].png:[150*6]"
        [/frame]
    [/standing_anim]
		
	[attack]
        name=seduce
        description=_"seduce"
		icon=attacks/EMMR_staff-magic.png
        type=impact
        range=melee
		[specials]
			[attacks]
			id=weapon_charm2
			name= _ "charm"
			name_inactive= _ "charm"
			description= _ "A living male unit affected by this spell will become an ally. Does not affect enemy leaders." 
			description_inactive= _ "A living male unit affected by this spell will become an ally. Does not affect enemy leaders."  
			apply_to=opponent
			value=0
			active_on=offense
			[/attacks]
		    [chance_to_hit]
			id=allurechance
			name= _ ""
			description= _ "This attack always has a 80% chance to hit regardless of the defensive ability of the unit being attacked."
			value=80
			cumulative=no
			[/chance_to_hit]
	[/specials]	
        damage=1
        number=1
    [/attack]

    [attack]
        name=hellfire
        description=_"Hellfire"
		icon=attacks/EMMR_staff-magic.png
        type=fire
        range=ranged
        [specials]
            {WEAPON_SPECIAL_MAGICAL}
        [/specials]		
        damage=12
        number=5
    [/attack]

    [attack]
        name=scythe
        description=_"Scythe"
		icon=attacks/EMMR_staff-magic.png
        type=blade
        range=melee		
        damage=7
        number=4
    [/attack]	
   
    [attack_anim]
        [filter_attack]
            name=hellfire
        [/filter_attack]      
        start_time=-375
        [frame]
            image="units/lighting/EMMR_Incarnation.png:75"
        [/frame]
        [frame]
            image="units/lighting/EMMR_Incarnation-hell[1~3].png:[100*3]"
            sound=fire.wav
        [/frame]
        [frame]
            image="units/lighting/EMMR_Incarnation.png:75"
        [/frame]
    [/attack_anim]
	
	[attack_anim]
        [filter_attack]
            name=scythe
        [/filter_attack]      
        start_time=-300
        [frame]
            image="units/lighting/EMMR_Incarnation.png:75"
        [/frame]
        [frame]
            image="units/lighting/EMMR_Incarnation-reap[1~3].png:[100*3]"
            sound=sword-1.ogg
        [/frame]
        [frame]
            image="units/lighting/EMMR_Incarnation.png:75"
        [/frame]
    [/attack_anim]
	
	[attack_anim]
        [filter_attack]
            name=seduce
        [/filter_attack]      
        start_time=-350
        [frame]
            image="units/lighting/EMMR_Incarnation.png:50"
        [/frame]
        [frame]
            image="units/lighting/EMMR_Incarnation-kiss[1~3].png:[100*3]"
            sound=kiss.wav
        [/frame]
        [frame]
            image="units/lighting/EMMR_Incarnation.png:50"
        [/frame]
    [/attack_anim]
{EMMR_SEDUCE}   
		
[/unit_type]


