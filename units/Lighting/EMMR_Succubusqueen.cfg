			image="units/lighting/EMMR_Succubusqueen.png:[100]"
		[/frame]
	[/standing_anim]
		
	[attack]
		name=seduce
		description=_"seduce"
		icon=attacks/EMMR_staff-magic.png
		type=impact
		range=melee
		[specials]
			[attacks]
			id=weapon_charm2
			name= _ "charm"
			name_inactive= _ "charm"
			description= _ "A living male unit affected by this spell will become an ally. Does not affect enemy leaders." 
			description_inactive= _ "A living male unit affected by this spell will become an ally. Does not affect enemy leaders."  
			apply_to=opponent
			value=0
			active_on=offense
			apply_to=opponent
			[/attacks]
			[chance_to_hit]
			id=allurechance
			name= _ ""
			description= _ "This attack always has a 70% chance to hit regardless of the defensive ability of the unit being attacked."
			value=70
			cumulative=no
			[/chance_to_hit]
	[/specials]	
		damage=1
		number=1
	[/attack]

	[attack]
		name=hellfire
		description=_"Hellfire"
		icon=attacks/EMMR_staff-magic.png
		type=fire
		range=ranged
		[specials]
			{WEAPON_SPECIAL_MAGICAL}
		[/specials]		
		damage=10
		number=5
	[/attack]

	[attack]
		name=scythe
		description=_"Scythe"
		icon=attacks/EMMR_staff-magic.png
		type=blade
		range=melee		
		damage=6
		number=4
	[/attack]	
   
	[attack_anim]
		[filter_attack]
			name=hellfire
		[/filter_attack]	  
		start_time=-375
		[frame]
			image="units/lighting/EMMR_Succubusqueen.png:75"
		[/frame]
		[frame]
			image="units/lighting/EMMR_Succubusqueen-hellfire[1~7].png:[100*7]"
