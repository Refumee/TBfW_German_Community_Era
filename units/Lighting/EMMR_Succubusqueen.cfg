		cold=100
		arcane=100
	[/resistance]	
	
	[standing_anim]
		start_time=0
		[frame]
			image="units/lighting/EMMR_Succubusqueen.png:[100]"
		[/frame]
		[frame]
			image="units/lighting/EMMR_Succubusqueen-stand[1,2,1].png:[150*3]"
