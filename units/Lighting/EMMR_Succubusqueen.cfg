		[filter_attack]
			name=seduce
		[/filter_attack]	  
		start_time=-350
		[frame]
			image="units/lighting/EMMR_Succubusqueen.png:50"
		[/frame]
		[frame]
			image="units/lighting/EMMR_Succubusqueen-kiss[1~3].png:[100*3]"
