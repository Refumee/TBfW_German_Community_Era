		[/frame]
		[frame]
			image="units/lighting/EMMR_Succubusqueen.png:75"
		[/frame]
	[/attack_anim]
	
	[attack_anim]
		[filter_attack]
			name=scythe
		[/filter_attack]	  
		start_time=-300
		[frame]
			image="units/lighting/EMMR_Succubusqueen.png:75"
