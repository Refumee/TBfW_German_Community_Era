#textdomain wesnoth-gce
[unit_type]
	id=EMMR_Succubusqueen
	name= _ "Succubusqueen"
	race=human
	gender=female
	image="units/lighting/EMMR_Succubusqueen.png"
	hitpoints=72
	movement_type=fly
	movement=5
	experience=130
	level=5
	alignment=neutral
	advances_to=EMMR_Incarnation
	cost=120
	usage=mixed fighter
	description= _ "Succubusqueen. Resists fire. Obey me!"
	die_sound={SOUND_LIST:HUMAN_FEMALE_DIE}
{DEFENSE_ANIM "units/lighting/EMMR_Succubusqueen-defend.png" "units/lighting/EMMR_Succubusqueen.png" {SOUND_LIST:HUMAN_FEMALE_HIT} }
