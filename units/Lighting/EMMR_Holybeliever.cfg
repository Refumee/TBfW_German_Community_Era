#textdomain wesnoth-gce
[unit_type]
	id=EMMR_Holybeliever
	name= _ "Holybeliever"
	race=human
	gender=male
	image="units/lighting/EMMR_Holybeliever.png"
	hitpoints=55
	movement_type=smallfoot
	movement=5
	experience=110
	level=4
	alignment=neutral
	advances_to=EMMR_Miracleweaver
	cost=80
	usage=healer
	description= _ "Holybeliever. Resists fire, cold and arcane. Heals your units up to 8hp or cures poison"
	die_sound={SOUND_LIST:HUMAN_DIE}
{DEFENSE_ANIM "units/lighting/EMMR_Holybeliever-defend.png" "units/lighting/EMMR_Holybeliever.png" {SOUND_LIST:HUMAN_OLD_HIT} }
	[resistance]
		fire=80
		cold=80
		arcane=60
	[/resistance]
	
	[abilities]
		{ABILITY_EMMR_HOLY_HEAL}
	[/abilities]

	[attack]
		name=great_light
		description=_"Great light"
		icon=attacks/EMMR_staff-magic.png
		type=arcane
		range=ranged	
		damage=12
		number=3
	[/attack]	
	
	[attack]
		name=soul_burn
		description=_"Soul burn"
		icon=attacks/EMMR_staff-magic.png
		type=arcane
		range=melee	
		damage=5
		number=3
	[/attack]

	[attack_anim]
		[filter_attack]
			name=soul_burn
		[/filter_attack]	  
		start_time=-500
		[frame]
			image="units/lighting/EMMR_Holybeliever.png:50"
		[/frame]
		[frame]
			image="units/lighting/EMMR_Holybeliever-attack[1,2].png:[250,150]"
			sound=magic-holy-2.ogg
		[/frame]
		[frame]
			image="units/lighting/EMMR_Holybeliever.png:50"
		[/frame]
	[/attack_anim]	
	
	[attack_anim]
		[filter_attack]
			name=great_light
		[/filter_attack]	  
		start_time=-675
		[frame]
			image="units/lighting/EMMR_Holybeliever.png:50"
		[/frame]
		[frame]
			image="units/lighting/EMMR_Holybeliever-attack[1~10].png:[125*10]"
			sound=magic-holy-2.ogg
		[/frame]
		[frame]
			image="units/lighting/EMMR_Holybeliever.png:50"
		[/frame]
	[/attack_anim]   
		
[/unit_type]


