#textdomain wesnoth-gce
[unit_type]
    id=EMMR_Highqueen
    name= _ "Highqueen"
    race=human
    gender=female
    image="units/lighting/EMMR_Highqueen.png"
    hitpoints=72
    movement_type=smallfoot
    movement=5
    experience=130
    level=5
    alignment=neutral
    advances_to=EMMR_Empress
    cost=120
    usage=mixed fighter
    description= _ "Highqueen. Resists arcane and cold. Gives all your nearby units 20% more damage for each lvl of the attacking unit.
	Bow to me or die!"
    die_sound={SOUND_LIST:HUMAN_FEMALE_DIE}
{DEFENSE_ANIM "units/lighting/EMMR_Highqueen-defend.png" "units/lighting/EMMR_Highqueen.png" {SOUND_LIST:HUMAN_FEMALE_HIT} }
	[resistance]
		fire=100
		cold=60
		arcane=60
    [/resistance]
	
	[abilities]
		{ABILITY_EMMR_HIGHQUEEN_LEADERSHIP}
	[/abilities]
	
	[standing_anim]
        start_time=0
        [frame]
            image="units/lighting/EMMR_Highqueen-stand[1~6,5~1].png:[100*11]"
        [/frame]
    [/standing_anim]

    [attack]
        name=icespear
        description=_"Icespear"
		icon=attacks/EMMR_staff-magic.png
        type=cold
        range=melee	
        damage=5
        number=4
    [/attack]

    [attack]
        name=icemeteor
        description=_"Icemeteor"
		icon=attacks/EMMR_staff-magic.png
        type=cold
        range=ranged	
        damage=9
        number=5
    [/attack]	
	
	[attack_anim]
        [filter_attack]
            name=icespear
        [/filter_attack]      
        start_time=-1150
        [frame]
            image="units/lighting/EMMR_Highqueen.png:50"
        [/frame]
        [frame]
            image="units/lighting/EMMR_Highqueen-ice[1~15].png:[100*15]"
            sound=ice.wav
        [/frame]
        [frame]
            image="units/lighting/EMMR_Highqueen.png:50"
        [/frame]
    [/attack_anim]
	
	[attack_anim]
        [filter_attack]
            name=icemeteor
        [/filter_attack]      
        start_time=-750
        [frame]
            image="units/lighting/EMMR_Highqueen.png:50"
        [/frame]
        [frame]
            image="units/lighting/EMMR_Highqueen-icemeteor[1~12].png:[100*12]"
            sound=ice.wav
        [/frame]
        [frame]
            image="units/lighting/EMMR_Highqueen.png:50"
        [/frame]
    [/attack_anim]
		
[/unit_type]


