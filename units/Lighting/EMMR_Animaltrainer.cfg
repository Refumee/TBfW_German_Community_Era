#textdomain wesnoth-gce
[unit_type]
	id=EMMR_Animaltrainer
	name= _ "Animaltrainer"
	race=human
	gender=female
	image="units/lighting/EMMR_Animaltrainer.png"
	hitpoints=42
	movement_type=smallfoot
	movement=5
	experience=90
	level=3
	alignment=neutral
	advances_to=EMMR_Animalexperimenter
	cost=40
	usage=mixed fighter
	description= _ "Animaltrainer. Resists blade. Ambushes. Was sick of beeing a princess now she runs with the wolfes."
	die_sound={SOUND_LIST:HUMAN_FEMALE_DIE}
{DEFENSE_ANIM "units/lighting/EMMR_Animaltrainer-defend.png" "units/lighting/EMMR_Animaltrainer.png" {SOUND_LIST:HUMAN_FEMALE_HIT} }
	[resistance]
		blade=70
	[/resistance]
	
	[abilities]
		{ABILITY_AMBUSH}
	[/abilities]

	[attack]
		name=axe_frenzy
		description=_"Axe frenzy"
		icon=attacks/EMMR_staff-magic.png
		type=blade
		range=melee	
		damage=9
		number=3
	[/attack]	
	
	[attack]
		name=animal_attack
		description=_"Animal attack"
		icon=attacks/EMMR_staff-magic.png
		type=pierce
		range=ranged	
		damage=5
		number=2
	[/attack]	
	
	[attack_anim]
		[filter_attack]
			name=axe_frenzy
		[/filter_attack]	  
		start_time=-800
		[frame]
			image="units/lighting/EMMR_Animaltrainer.png:50"
		[/frame]
		[frame]
			image="units/lighting/EMMR_Animaltrainer-attack[1,2].png:[200*2]"
			sound=axe.ogg
		[/frame]
		[frame]
			image="units/lighting/EMMR_Animaltrainer-attack3.png:[200]"
			sound=axe.ogg
		[/frame]
		[frame]
			image="units/lighting/EMMR_Animaltrainer.png:50"
		[/frame]
	[/attack_anim] 

	[attack_anim]
		[filter_attack]
			name=animal_attack
		[/filter_attack]	  
		start_time=-800
		[frame]
			image="units/lighting/EMMR_Animaltrainer.png:50"
		[/frame]
		[frame]
			image="units/lighting/EMMR_Animaltrainer-dog[1~4].png:[200*4]"
			sound=wolf-growl-1.ogg
		[/frame]
		[frame]
			image="units/lighting/EMMR_Animaltrainer.png:50"
		[/frame]
	[/attack_anim]  	
		
[/unit_type]


