#textdomain wesnoth-gce
[unit_type]
	id=EMMR_Frostmage
	name= _ "Frostmage"
	race=human
	gender=male
	image="units/lighting/EMMR_Frostmage.png"
	hitpoints=72
	movement_type=smallfoot
	movement=5
	experience=130
	level=5
	alignment=neutral
	advances_to=EMMR_Iceelementar
	cost=120
	usage=mixed fighter
	description= _ "Frostmage. Resists to cold. Weak to fire and imact. Extreme one hit damage. His surroundings are so cold, as he is also becoming ice."
	die_sound={SOUND_LIST:HUMAN_DIE}
{DEFENSE_ANIM "units/lighting/EMMR_Frostmage-defend.png" "units/lighting/EMMR_Frostmage.png" ice.wav }
	[resistance]
		fire=140
		cold=50
		arcane=100
		pierce=100
		blade=100
		impact=130
	[/resistance]
	
	[idle_anim]
		{STANDARD_IDLE_FILTER}
		start_time=0
		[frame]
			image="units/lighting/EMMR_Frostmage-stand[1~13].png:[100*13]"
		[/frame]
	[/idle_anim]	
	
	[attack]
		name=icemeteor
		description=_"Icemeteor"
		icon=attacks/EMMR_staff-magic.png
		[specials]
		{WEAPON_SPECIAL_MAGICAL}
		[/specials]
		type=cold
		range=ranged	
		damage=50
		number=1
	[/attack]	
	
	[attack]
		name=icesplitter
		description=_"Icesplitter"
		icon=attacks/EMMR_staff-magic.png
		[specials]
		{WEAPON_SPECIAL_SLOW}
		[/specials]
		type=cold
		range=melee	
		damage=7
		number=3
	[/attack]

	[attack_anim]
		[filter_attack]
			name=icemeteor
		[/filter_attack]	  
		start_time=-575
		[frame]
			image="units/lighting/EMMR_Frostmage.png:50"
		[/frame]
		[frame]
			image="units/lighting/EMMR_Frostmage-attack[1~14].png:[75*14]"
			sound=ice.wav
		[/frame]
		[frame]
			image="units/lighting/EMMR_Frostmage.png:50"
		[/frame]
	[/attack_anim]	
	
	[attack_anim]
		[filter_attack]
			name=icesplitter
		[/filter_attack]	  
		start_time=-650
		[frame]
			image="units/lighting/EMMR_Frostmage.png:50"
		[/frame]
		[frame]
			image="units/lighting/EMMR_Frostmage-icy[1~9].png:[100*9]"
			sound=ice.wav
		[/frame]
		[frame]
			image="units/lighting/EMMR_Frostmage.png:50"
		[/frame]
	[/attack_anim]
{EMMR_SEDUCE}   
		
[/unit_type]


