#textdomain wesnoth-gce
[unit_type]
    id=EMMR_Dnacrosser
    name= _ "Dnacrosser"
    race=human
    gender=female
    image="units/lighting/EMMR_Dnacrosser.png"
    hitpoints=72
    movement_type=smallfoot
    movement=5
    experience=130
    level=5
    alignment=neutral
    advances_to=EMMR_Beastgirl
    cost=120
    usage=mixed fighter
    description= _ "Dnacrosser. Resists blade. Ambushes. Lets mix this with that. Mhh!! I didnt expect that..."
    die_sound={SOUND_LIST:HUMAN_FEMALE_DIE}
{DEFENSE_ANIM "units/lighting/EMMR_Dnacrosser-defend.png" "units/lighting/EMMR_Dnacrosser.png" {SOUND_LIST:HUMAN_FEMALE_HIT} }
	[resistance]
		blade=50
    [/resistance]
	
	[abilities]
		{ABILITY_AMBUSH}
	[/abilities]
	
	[standing_anim]
        start_time=0
        [frame]
            image="units/lighting/EMMR_Dnacrosser.png:[2000]"
        [/frame]
		[frame]
            image="units/lighting/EMMR_Dnacrosser-stand.png:[150]"
        [/frame]
    [/standing_anim]

    [attack]
        name=animal_backup
        description=_"Animal backup"
		icon=attacks/EMMR_staff-magic.png
		[specials]
			{WEAPON_SPECIAL_POISON}
		[/specials]
        type=arcane
        range=ranged	
        damage=6
        number=3
    [/attack]	
	
	[attack]
        name=animal_attack
        description=_"Animal attack"
		icon=attacks/EMMR_staff-magic.png
        type=pierce
        range=melee	
        damage=12
        number=4
    [/attack]	
	
	[attack_anim]
        [filter_attack]
            name=animal_backup
        [/filter_attack]      
        start_time=-450
        [frame]
            image="units/lighting/EMMR_Dnacrosser.png:50"
        [/frame]
        [frame]
            image="units/lighting/EMMR_Dnacrosser-jump[1~5].png:[100*5]"
            sound=lion.wav
        [/frame]
        [frame]
            image="units/lighting/EMMR_Dnacrosser.png:50"
        [/frame]
    [/attack_anim] 

	[attack_anim]
        [filter_attack]
            name=animal_attack
        [/filter_attack]      
        start_time=-300
        [frame]
            image="units/lighting/EMMR_Dnacrosser.png:50"
        [/frame]
        [frame]
            image="units/lighting/EMMR_Dnacrosser-attack[1~3].png:[100*3]"
            sound=lion.wav
        [/frame]
        [frame]
            image="units/lighting/EMMR_Dnacrosser.png:50"
        [/frame]
    [/attack_anim]  	
		
[/unit_type]


