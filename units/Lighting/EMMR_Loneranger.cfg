#textdomain wesnoth-gce
[unit_type]
	id=EMMR_Loneranger
	name= _ "Loneranger"
	race=human
	gender=male
	image="units/lighting/EMMR_Loneranger.png"
	hitpoints=122
	movement_type=mounted
	movement=8
	experience=180
	level=7
	alignment=neutral
	advances_to=null
	{AMLA_DEFAULT}
	cost=200
	usage=scout
	description= _ "Loneranger scout. Shoots, whips and horses. Half blade damage and resists pierce "
	die_sound={SOUND_LIST:HUMAN_DIE}
{DEFENSE_ANIM "units/lighting/EMMR_Loneranger-defend.png" "units/lighting/EMMR_Loneranger.png" {SOUND_LIST:HORSE_HIT} }
	[resistance]
		blade=50
		impact=100
		pierce=80
	[/resistance]
	
	[abilities]
		{ABILITY_SKIRMISHER}
	[/abilities]

	[attack]
		name=trample
		description=_"Trample"
		icon=attacks/EMMR_staff-magic.png
		type=impact
		[specials]
			{WEAPON_SPECIAL_EMMR_DISTANT_ATTACK}
		[/specials]
		range=melee
		damage=8
		number=3
	[/attack]
	
	[attack]
		name=whip
		description=_"Whip"
		icon=attacks/EMMR_staff-magic.png
		type=impact
		range=melee
		damage=7
		number=4
	[/attack]
	
	[attack]
		name=rifle
		description=_"Rifle"
		icon=attacks/EMMR_staff-magic.png
		type=pierce
		range=ranged
		damage=13
		number=5
	[/attack]
	
	[attack_anim]
		[filter_attack]
			name=whip
		[/filter_attack]
		start_time=-250
		[frame]
			image="units/lighting/EMMR_Loneranger.png:50"
		[/frame]
		[frame]
			image="units/lighting/EMMR_Loneranger-whip[1~3].png:[100*3]"
			sound=whip.wav
		[/frame]
		[frame]
			image="units/lighting/EMMR_Loneranger.png:50"
		[/frame]
	[/attack_anim]
	
	[attack_anim]
		[filter_attack]
			name=trample
		[/filter_attack]
		start_time=-150
		[frame]
			image="units/lighting/EMMR_Loneranger.png:50"
		[/frame]
		[frame]
			image="units/lighting/EMMR_Loneranger-defend.png:[100]"
		[/frame]
		{SOUND:HIT_AND_MISS horse-canter.wav {SOUND_LIST:MISS} -100}
		[frame]
			image="units/lighting/EMMR_Loneranger.png:50"
		[/frame]
	[/attack_anim]
	
	[attack_anim]
		[filter_attack]
			name=rifle
		[/filter_attack]
		start_time=-150
		[frame]
			image="units/lighting/EMMR_Loneranger.png:50"
		[/frame]
		[frame]
			image="units/lighting/EMMR_Loneranger-rifle[1~3].png:[150*3]"
			sound=shot.wav
		[/frame]
		[frame]
			image="units/lighting/EMMR_Loneranger.png:50"
		[/frame]
	[/attack_anim]
	
[/unit_type]


