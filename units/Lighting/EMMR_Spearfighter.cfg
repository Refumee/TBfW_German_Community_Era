#textdomain wesnoth-gce
[unit_type]
	id=EMMR_Spearfighter
	name= _ "Spearfighter"
	race=human
	gender=male
	image="units/lighting/spearfighter.png"
	hitpoints=24
	movement_type=smallfoot
	movement=5
	experience=50
	level=1
	alignment=neutral
	advances_to=EMMR_Lancer
	cost=10
	usage=fighter
	description= _ "Spearfighter."
	die_sound={SOUND_LIST:HUMAN_DIE}
{DEFENSE_ANIM "units/lighting/spearfighter-defend.png" "units/lighting/spearfighter.png" {SOUND_LIST:HUMAN_OLD_HIT} }

	[attack]
		name=spear
		description=_"spear"
		icon=attacks/EMMR_staff-magic.png
		type=pierce
		[specials]
			{WEAPON_SPECIAL_EMMR_DISTANT_ATTACK}
		[/specials]
		range=melee
		damage=5
		number=1
	[/attack]
	[attack]
		name=frenzy
		description=_"frenzy"
		icon=attacks/EMMR_magic-missile.png
		type=pierce
		range=melee
		damage=5
		number=2
	[/attack]

	[attack_anim]
		[filter_attack]
			name=spear,frenzy
		[/filter_attack]
		start_time=-250
		[frame]
			image="units/lighting/spearfighter.png:50"
		[/frame]
		[frame]
			image="units/lighting/spearfighter-spear-attack[1,2,1].png:[100,300,200]"
		[/frame]
		{SOUND:HIT_AND_MISS spear.ogg staff-miss.ogg -125}
		[frame]
			image="units/lighting/spearfighter-spear-attack[1,2,1].png:[100,300,200]"
		[/frame]
		[frame]
			image="units/lighting/spearfighter.png:50"
		[/frame]
	[/attack_anim]
[/unit_type]

