#textdomain wesnoth-gce
[unit_type]
	id=EMMR_Arcmage
	name= _ "Arcmage"
	race=human
	gender=male
	image="units/lighting/arch-mage.png"
	hitpoints=32
	movement_type=smallfoot
	movement=5
	experience=70
	level=2
	alignment=neutral
	advances_to=EMMR_Highmage
	cost=20
	usage=mixed fighter
	description= _ "Arcmage. Resists fire and cold. This unit uses the same sprites as the Arch-Mage from core "
	die_sound={SOUND_LIST:HUMAN_DIE}
{DEFENSE_ANIM "units/lighting/arch-mage-defend.png" "units/lighting/arch-mage.png" {SOUND_LIST:HUMAN_HIT} }
	[resistance]
		fire=80
		cold=80
		arcane=100
	[/resistance]
	
	[idle_anim]
		{STANDARD_IDLE_FILTER}
		start_time=0
		[frame]
			image="units/lighting/arch-mage-idle-[1~5,4~1].png:[100*4,2000,100*4]"
		[/frame]
	[/idle_anim]
	
   [attack]
		name=staff
		description=_"staff"
		icon=attacks/EMMR_staff-magic.png
		type=impact
		range=melee
		damage=5
		number=2
	[/attack]
	[attack]
		name=fireball
		description=_"fireball"
		type=fire
		range=ranged
		[specials]
			{WEAPON_SPECIAL_MAGICAL}
		[/specials]
		damage=7
		number=3
	[/attack]
	
	[standing_anim]
		start_time=0
		[frame]
			image="units/lighting/arch-mage-standing-[1~10].png:[150*4,200,150*5]"
		[/frame]
	[/standing_anim]
	[attack_anim]
		[filter_attack]
			name=fireball
		[/filter_attack]
		{MISSILE_FRAME_FIREBALL_XY 17 -22}
		start_time=-575
		[frame]
			image="units/lighting/arch-mage.png:50"
		[/frame]
		[frame]
			image="units/lighting/arch-mage-attack-magic-1.png:100"
		[/frame]
		[frame]
			image="units/lighting/arch-mage-attack-magic-[2,1].png:[150,75]"
			sound=fire.wav
		[/frame]
		[frame]
			image="units/lighting/arch-mage.png:75"
		[/frame]
	[/attack_anim]
	[attack_anim]
		[filter_attack]
			name=staff
		[/filter_attack]
		start_time=-250
		[frame]
			image="units/lighting/arch-mage.png:50"
		[/frame]
		[frame]
			image="units/lighting/arch-mage-attack-staff-[1~2].png:[100,200]"
		[/frame]
		{SOUND:HIT_AND_MISS staff.ogg staff-miss.ogg -125}
		[frame]
			image="units/lighting/arch-mage-attack-magic-1.png:75"
		[/frame]
		[frame]
			image="units/lighting/arch-mage.png:75"
		[/frame]
	[/attack_anim]

		
[/unit_type]


