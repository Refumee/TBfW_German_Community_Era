#textdomain wesnoth-gce
[unit_type]
	id=EMMR_Fireelementar
	name= _ "Fireelementar"
	race=human
	gender=male
	image="units/lighting/EMMR_Fireelementar.png"
	hitpoints=94
	movement_type=smallfoot
	movement=5
	experience=150
	level=6
	alignment=neutral
	advances_to=EMMR_Fireavatar
	cost=160
	usage=mixed fighter
	description= _ "Fireelementar. Resists to fire. Weak to cold and imact."
	die_sound={SOUND_LIST:HUMAN_DIE}
{DEFENSE_ANIM "units/lighting/EMMR_Fireelementar-defend.png" "units/lighting/EMMR_Fireelementar.png" {SOUND_LIST:HUMAN_HIT} }
	[resistance]
		fire=30
		cold=140
		arcane=100
		pierce=100
		blade=100
		impact=130
	[/resistance]
	
	[standing_anim]
		start_time=0
		[frame]
			image="units/lighting/EMMR_Fireelementar.png:[150]"
		[/frame]
		[frame]
			image="units/lighting/EMMR_Fireelementar-stand[1~3].png:[150*3]"
		[/frame]
	[/standing_anim]
	
	[attack]
		name=firenova
		description=_"Firenova"
		icon=attacks/EMMR_staff-magic.png
		[specials]
		{WEAPON_SPECIAL_MAGICAL}
		[/specials]
		type=fire
		range=ranged	
		damage=12
		number=5
	[/attack]	
	
	[attack]
		name=fire_hit
		description=_"Fire hit"
		icon=attacks/EMMR_staff-magic.png
		type=fire
		range=melee	
		damage=6
		number=4
	[/attack]

	[attack_anim]
		[filter_attack]
			name=firenova
		[/filter_attack]	  
		start_time=-650
		[frame]
			image="units/lighting/EMMR_Fireelementar.png:50"
		[/frame]
		[frame]
			image="units/lighting/EMMR_Fireelementar-nova[1~20].png:[50*20]"
			sound=fire.wav
		[/frame]
		[frame]
			image="units/lighting/EMMR_Fireelementar.png:50"
		[/frame]
	[/attack_anim]	
	
	[attack_anim]
		[filter_attack]
			name=fire_hit
		[/filter_attack]	  
		start_time=-250
		[frame]
			image="units/lighting/EMMR_Fireelementar.png:50"
		[/frame]
		[frame]
			image="units/lighting/EMMR_Fireelementar-attack.png:[100]"
			sound=fire.wav
		[/frame]
		[frame]
			image="units/lighting/EMMR_Fireelementar.png:50"
		[/frame]
	[/attack_anim]
{EMMR_SEDUCE}   
		
[/unit_type]


