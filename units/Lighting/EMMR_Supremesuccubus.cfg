#textdomain wesnoth-gce
[unit_type]
    id=EMMR_Supremesuccubus
    name= _ "Supremesuccubus"
    race=human
    gender=female
    image="units/lighting/EMMR_Supremesuccubus.png"
    hitpoints=55
    movement_type=fly
    movement=5
    experience=110
    level=4
    alignment=neutral
    advances_to=EMMR_Succubusqueen
    cost=80
    usage=mixed fighter
    description= _ "Supremesuccubus. Resists fire."
    die_sound={SOUND_LIST:HUMAN_FEMALE_DIE}
{DEFENSE_ANIM "units/lighting/EMMR_Supremesuccubus-defend.png" "units/lighting/EMMR_Supremesuccubus.png" {SOUND_LIST:HUMAN_FEMALE_HIT} }
	[resistance]
		fire=60
		cold=100
		arcane=100
    [/resistance]	
	
	[standing_anim]
        start_time=0
		[frame]
            image="units/lighting/EMMR_Supremesuccubus.png:[100]"
        [/frame]
        [frame]
            image="units/lighting/EMMR_Supremesuccubus-stand[1~9].png:[150*9]"
        [/frame]
		[frame]
            image="units/lighting/EMMR_Supremesuccubus.png:[100]"
        [/frame]
    [/standing_anim]
		
	[attack]
        name=seduce
        description=_"seduce"
		icon=attacks/EMMR_staff-magic.png
        type=impact
        range=melee
		[specials]
			[attacks]
			id=weapon_charm2
			name= _ "charm"
			name_inactive= _ "charm"
			description= _ "A living male unit affected by this spell will become an ally. Does not affect enemy leaders." 
			description_inactive= _ "A living male unit affected by this spell will become an ally. Does not affect enemy leaders."  
			apply_to=opponent
			value=0
			active_on=offense
			apply_to=opponent
			[/attacks]
		    [chance_to_hit]
			id=allurechance
			name= _ ""
			description= _ "This attack always has a 60% chance to hit regardless of the defensive ability of the unit being attacked."
			value=60
			cumulative=no
			[/chance_to_hit]
	[/specials]	
        damage=1
        number=1
    [/attack]

    [attack]
        name=bloodcrystal_fall
        description=_"Bloodcrystal fall"
		icon=attacks/EMMR_staff-magic.png
        type=pierce
        range=ranged
        [specials]
            {WEAPON_SPECIAL_MAGICAL}
        [/specials]		
        damage=10
        number=4
    [/attack]

    [attack]
        name=bloodcrystal_throw
        description=_"Bloodcrystal throw"
		icon=attacks/EMMR_staff-magic.png
        type=pierce
        range=melee		
        damage=7
        number=3
    [/attack]	
   
    [attack_anim]
        [filter_attack]
            name=bloodcrystal_fall
        [/filter_attack]      
        start_time=-675
        [frame]
            image="units/lighting/EMMR_Supremesuccubus.png:75"
        [/frame]
        [frame]
            image="units/lighting/EMMR_Supremesuccubus-attack[1~8].png:[100*8]"
            sound=crystal.wav
        [/frame]
        [frame]
            image="units/lighting/EMMR_Supremesuccubus.png:75"
        [/frame]
    [/attack_anim]
	
	[attack_anim]
        [filter_attack]
            name=bloodcrystal_throw
        [/filter_attack]      
        start_time=-675
        [frame]
            image="units/lighting/EMMR_Supremesuccubus.png:75"
        [/frame]
        [frame]
            image="units/lighting/EMMR_Supremesuccubus-bcrys[1~11].png:[100*11]"
            sound=crystal.wav
        [/frame]
        [frame]
            image="units/lighting/EMMR_Supremesuccubus.png:75"
        [/frame]
    [/attack_anim]
	
	[attack_anim]
        [filter_attack]
            name=seduce
        [/filter_attack]      
        start_time=-650
        [frame]
            image="units/lighting/EMMR_Supremesuccubus.png:50"
        [/frame]
        [frame]
            image="units/lighting/EMMR_Supremesuccubus-kiss[1~6].png:[100*6]"
            sound=kiss.wav
        [/frame]
        [frame]
            image="units/lighting/EMMR_Supremesuccubus.png:50"
        [/frame]
    [/attack_anim]
{EMMR_SEDUCE}   
		
[/unit_type]


