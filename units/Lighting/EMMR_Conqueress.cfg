#textdomain wesnoth-gce
[unit_type]
	id=EMMR_Conqueress
	name= _ "Conqueress"
	race=human
	gender=female
	image="units/lighting/EMMR_Conqueress.png"
	hitpoints=122
	movement_type=armoredfoot
	movement=5
	experience=180
	level=7
	alignment=neutral
	advances_to=null
	{AMLA_DEFAULT}
	cost=200
	usage=mixed fighter
	description= _ "Conqueress. Resists arcane and cold. Armored. Gives all your nearby units 30% more damage for each lvl of the attacking unit.
	I will conquer the world. Bow to me or die!"
	die_sound={SOUND_LIST:HUMAN_FEMALE_DIE}
{DEFENSE_ANIM "units/lighting/EMMR_Conqueress-defend.png" "units/lighting/EMMR_Conqueress.png" {SOUND_LIST:HUMAN_FEMALE_HIT} }
	[resistance]
		fire=100
		cold=50
		arcane=50
	[/resistance]
	
	[abilities]
		{ABILITY_EMMR_CONQUERESS_LEADERSHIP}
	[/abilities]
	
	[standing_anim]
		start_time=0
		[frame]
			image="units/lighting/EMMR_Conqueress.png:[100]"
		[/frame]
		[frame]
			image="units/lighting/EMMR_Conqueress-stand[1~5,4~1].png:[100*9]"
		[/frame]
	[/standing_anim]

	[attack]
		name=icesword
		description=_"Icesword"
		icon=attacks/EMMR_staff-magic.png
		type=cold
		range=melee	
		damage=7
		number=4
	[/attack]

	[attack]
		name=swordfall
		description=_"Icewordfall"
		icon=attacks/EMMR_staff-magic.png
		type=cold
		range=ranged	
		damage=16
		number=4
	[/attack]	
	
	[attack_anim]
		[filter_attack]
			name=icesword
		[/filter_attack]	  
		start_time=-550
		[frame]
			image="units/lighting/EMMR_Conqueress.png:50"
		[/frame]
		[frame]
			image="units/lighting/EMMR_Conqueress-attack[1~3].png:[100*3]"
			sound=sword-1.ogg
		[/frame]
		[frame]
			image="units/lighting/EMMR_Conqueress.png:50"
		[/frame]
	[/attack_anim]
	
	[attack_anim]
		[filter_attack]
			name=swordfall
		[/filter_attack]	  
		start_time=-650
		[frame]
			image="units/lighting/EMMR_Conqueress.png:50"
		[/frame]
		[frame]
			image="units/lighting/EMMR_Conqueress-fall[1~9].png:[100*9]"
			sound=ice.wav
		[/frame]
		[frame]
			image="units/lighting/EMMR_Conqueress.png:50"
		[/frame]
	[/attack_anim]
		
[/unit_type]


