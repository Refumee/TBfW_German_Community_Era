#textdomain wesnoth-gce
[unit_type]
	id=EMMR_Heavyimpaler
	name= _ "Heavyimpaler"
	race=human
	gender=male
	image="units/lighting/EMMR_Ridingimpaler.png"
	hitpoints=72
	movement_type=mounted
	movement=5
	experience=130
	level=5
	alignment=neutral
	advances_to=EMMR_Ridingreaper
	cost=120
	usage=fighter
	description= _ "Riding lancer."
	die_sound={SOUND_LIST:HUMAN_DIE}
{DEFENSE_ANIM "units/lighting/EMMR_Ridingimpaler-defend.png" "units/lighting/EMMR_Ridingimpaler.png" {SOUND_LIST:HORSE_HIT} }
	[resistance]
		blade=80
		impact=120
		cold=90
		pierce=100
	[/resistance]
	
	[attack]
		name=trample
		description=_"trample"
		icon=attacks/EMMR_staff-magic.png
		type=impact
		[specials]
			{WEAPON_SPECIAL_EMMR_DISTANT_ATTACK}
		[/specials]
		range=melee
		damage=5
		number=4
	[/attack]
	
	[attack]
		name=impale
		description=_"impale"
		icon=attacks/EMMR_staff-magic.png
		type=pierce
		range=melee
		damage=11
		number=5
	[/attack]

	[attack_anim]
		[filter_attack]
			name=trample
		[/filter_attack]
		start_time=-250
		[frame]
			image="units/lighting/EMMR_Ridingimpaler.png:50"
		[/frame]
		[frame]
			image="units/lighting/EMMR_Ridingimpaler.png:[100]"
		[/frame]
		{SOUND:HIT_AND_MISS horse-canter.wav {SOUND_LIST:MISS} -100}
		[frame]
			image="units/lighting/EMMR_Ridingimpaler.png:50"
		[/frame]
	[/attack_anim]
	
	[attack_anim]
		[filter_attack]
			name=impale
		[/filter_attack]
		start_time=-250
		[frame]
			image="units/lighting/EMMR_Ridingimpaler.png:50"
		[/frame]
		[frame]
			image="units/lighting/EMMR_Ridingimpaler-attack.png:[100]"
		[/frame]
		{SOUND:HIT_AND_MISS spear.ogg {SOUND_LIST:MISS} -100}
		[frame]
			image="units/lighting/EMMR_Ridingimpaler.png:50"
		[/frame]
	[/attack_anim]

	
	
[/unit_type]


