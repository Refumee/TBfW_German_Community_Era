#textdomain wesnoth-gce
[unit_type]
    id=EMMR_Soulreaper
    name= _ "Soulreaper"
    race=human
    gender=male
    image="units/lighting/EMMR_Soulreaper.png"
    hitpoints=94
    movement_type=smallfoot
    movement=5
    experience=150
    level=6
    alignment=neutral
    advances_to=EMMR_Death
    cost=160
    usage=fighter
    description= _ "Soulreaper."
    die_sound={SOUND_LIST:HUMAN_DIE}
{DEFENSE_ANIM "units/lighting/EMMR_Soulreaper-defend.png" "units/lighting/EMMR_Soulreaper.png" {SOUND_LIST:HUMAN_OLD_HIT} }
	[resistance]
        blade=70
        impact=120
        cold=80
		pierce=100
    [/resistance]
	
	[standing_anim]
        start_time=0
        [frame]
            image="units/lighting/EMMR_Soulreaper-stand[1~5].png:[150*5]"
        [/frame]
    [/standing_anim]
	
	[attack]
        name=deathspike
        description=_"Deathspike"
        icon=attacks/EMMR_staff-magic.png
        type=pierce
		[specials]
			{WEAPON_SPECIAL_EMMR_DISTANT_ATTACK}
		[/specials]
        range=ranged
        damage=6
        number=4
    [/attack]	
	
    [attack]
        name=slice
        description=_"Slice"
        icon=attacks/EMMR_staff-magic.png
        type=blade
        range=melee
        damage=12
        number=5
    [/attack]

	[attack_anim]
        [filter_attack]
            name=deathspike
        [/filter_attack]
        start_time=-350
        [frame]
            image="units/lighting/EMMR_Soulreaper.png:50"
        [/frame]
        [frame]
            image="units/lighting/EMMR_Soulreaper-spear[1~9].png:[100*9]"
        [/frame]
        {SOUND:HIT_AND_MISS spear.ogg {SOUND_LIST:MISS} -100}
        [frame]
            image="units/lighting/EMMR_Soulreaper.png:50"
        [/frame]
    [/attack_anim]
	
	[attack_anim]
        [filter_attack]
            name=slice
        [/filter_attack]
        start_time=-150
        [frame]
            image="units/lighting/EMMR_Soulreaper.png:50"
        [/frame]
        [frame]
            image="units/lighting/EMMR_Soulreaper-reap.png:[100]"
        [/frame]
        {SOUND:HIT_AND_MISS sword-1.ogg {SOUND_LIST:MISS} -100}
        [frame]
            image="units/lighting/EMMR_Soulreaper.png:50"
        [/frame]
    [/attack_anim]
		
[/unit_type]


