#textdomain wesnoth-gce
[unit_type]
	id=EMMR_Fireavatar
	name= _ "Fireavatar"
	race=human
	gender=male
	image="units/lighting/EMMR_Fireavatar.png"
	hitpoints=122
	movement_type=smallfoot
	movement=5
	experience=180
	level=7
	alignment=neutral
	advances_to=null
	{AMLA_DEFAULT}
	cost=200
	usage=mixed fighter
	description= _ "Fireavatar. Immune to fire. Weak to cold and imact."
	die_sound={SOUND_LIST:HUMAN_DIE}
{DEFENSE_ANIM "units/lighting/EMMR_Fireavatar-defend.png" "units/lighting/EMMR_Fireavatar.png" {SOUND_LIST:HUMAN_HIT} }
	[resistance]
		fire=0
		cold=150
		arcane=100
		pierce=100
		blade=100
		impact=130
	[/resistance]
	
	[standing_anim]
		start_time=0
		[frame]
			image="units/lighting/EMMR_Fireavatar.png:[150]"
		[/frame]
		[frame]
			image="units/lighting/EMMR_Fireavatar-stand[1~3].png:[150*3]"
		[/frame]
	[/standing_anim]
	
	[attack]
		name=firerain
		description=_"Firerain"
		icon=attacks/EMMR_staff-magic.png
		[specials]
		{WEAPON_SPECIAL_MAGICAL}
		[/specials]
		type=fire
		range=ranged	
		damage=14
		number=5
	[/attack]	
	
	[attack]
		name=fireball
		description=_"Fireball"
		icon=attacks/EMMR_staff-magic.png
		type=fire
		range=melee	
		damage=7
		number=4
	[/attack]

	[attack_anim]
		[filter_attack]
			name=firerain
		[/filter_attack]	  
		start_time=-350
		[frame]
			image="units/lighting/EMMR_Fireavatar.png:50"
		[/frame]
		[frame]
			image="units/lighting/EMMR_Fireavatar-rain[1~11].png:[75*11]"
			sound=fire.wav
		[/frame]
		[frame]
			image="units/lighting/EMMR_Fireavatar.png:50"
		[/frame]
	[/attack_anim]	
	
	[attack_anim]
		[filter_attack]
			name=fireball
		[/filter_attack]	  
		start_time=-250
		[frame]
			image="units/lighting/EMMR_Fireavatar.png:50"
		[/frame]
		[frame]
			image="units/lighting/EMMR_Fireavatar-ball[1,2].png:[100*2]"
			sound=fire.wav
		[/frame]
		[frame]
			image="units/lighting/EMMR_Fireavatar.png:50"
		[/frame]
	[/attack_anim]
{EMMR_SEDUCE}   
		
[/unit_type]


