#textdomain wesnoth-gce
[unit_type]
    id=EMMR_Ninja
    name= _ "Ninja"
    race=human
    gender=male
    image="units/lighting/EMMR_Ninja.png"
    hitpoints=42
    movement_type=smallfoot
    movement=5
    experience=90
    level=3
    alignment=neutral
    advances_to=EMMR_Ninjalegend
    cost=40
    usage=mixed fighter
    description= _ "Ninja. Resists arcane.Invisible at night"
    die_sound={SOUND_LIST:HUMAN_DIE}
{DEFENSE_ANIM "units/lighting/EMMR_Ninja-defend.png" "units/lighting/EMMR_Ninja.png" {SOUND_LIST:HUMAN_HIT} }
	[resistance]
		fire=100
		cold=100
		arcane=80
		blade=100
		impact=100
    [/resistance]
	
	[abilities]
		{ABILITY_NIGHTSTALK}
	[/abilities]
	
	[standing_anim]
        start_time=0
		[frame]
            image="units/lighting/EMMR_Ninja.png:[100]"
        [/frame]
        [frame]
            image="units/lighting/EMMR_Ninja-stand[1~5].png:[100*5]"
        [/frame]
    [/standing_anim]

    [attack]
        name=shuriken
        description=_"Shuriken"
		icon=attacks/EMMR_staff-magic.png
		[specials]
			{WEAPON_SPECIAL_POISON}
		[/specials]
        type=blade
        range=ranged	
        damage=5
        number=3
    [/attack]

    [attack]
        name=shuriken_hit
        description=_"Shuriken hit"
		icon=attacks/EMMR_staff-magic.png
        type=blade
        range=melee	
        damage=9
        number=3
    [/attack]		
		
	[attack_anim]
        [filter_attack]
            name=shuriken
        [/filter_attack]      
        start_time=-500
        [frame]
            image="units/lighting/EMMR_Ninja.png:50"
        [/frame]
        [frame]
            image="units/lighting/EMMR_Ninja-attack[1~8].png:[75*8]"
            sound=throwing-knife.ogg
        [/frame]
        [frame]
            image="units/lighting/EMMR_Ninja.png:50"
        [/frame]
    [/attack_anim]

	[attack_anim]
        [filter_attack]
            name=shuriken_hit
        [/filter_attack]      
        start_time=-350
        [frame]
            image="units/lighting/EMMR_Ninja.png:50"
        [/frame]
        [frame]
            image="units/lighting/EMMR_Ninja-attack[1,2].png:[150*2]"
            sound=knife.ogg
        [/frame]
        [frame]
            image="units/lighting/EMMR_Ninja.png:50"
        [/frame]
    [/attack_anim]		
		
[/unit_type]


