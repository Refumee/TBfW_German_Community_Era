#textdomain wesnoth-gce
[unit_type]
    id=EMMR_Ridingsplinter
    name= _ "Ridingsplinter"
    race=human
    gender=male
    image="units/lighting/EMMR_Ridingsplinter.png"
    hitpoints=94
    movement_type=mounted
    movement=5
    experience=150
    level=6
    alignment=neutral
    advances_to=null
	{AMLA_DEFAULT}
    cost=160
    usage=fighter
    description= _ "Ridingsplinter."
    die_sound={SOUND_LIST:HUMAN_DIE}
{DEFENSE_ANIM "units/lighting/EMMR_Ridingsplinter-defend.png" "units/lighting/EMMR_Ridingsplinter.png" {SOUND_LIST:HORSE_HIT} }
	[resistance]
        blade=100
        impact=120
        cold=70
		pierce=100
    [/resistance]
	
    [attack]
        name=trample
        description=_"Trample"
        icon=attacks/EMMR_staff-magic.png
        type=impact
		[specials]
			{WEAPON_SPECIAL_EMMR_DISTANT_ATTACK}
		[/specials]
        range=melee
        damage=5
        number=4
    [/attack]
	
    [attack]
        name=mace
        description=_"Mace"
        icon=attacks/EMMR_staff-magic.png
        type=impact
        range=melee
        damage=16
        number=4
    [/attack]

    [attack_anim]
        [filter_attack]
            name=trample
        [/filter_attack]
        start_time=-150
        [frame]
            image="units/lighting/EMMR_Ridingsplinter.png:50"
        [/frame]
        [frame]
            image="units/lighting/EMMR_Ridingsplinter.png:[100]"
        [/frame]
        {SOUND:HIT_AND_MISS horse-canter.wav {SOUND_LIST:MISS} -100}
        [frame]
            image="units/lighting/EMMR_Ridingsplinter.png:50"
        [/frame]
    [/attack_anim]
	
	[attack_anim]
        [filter_attack]
            name=mace
        [/filter_attack]
        start_time=-250
        [frame]
            image="units/lighting/EMMR_Ridingsplinter.png:50"
        [/frame]
        [frame]
            image="units/lighting/EMMR_Ridingsplinter-attack[1,2].png:[100*2]"
        [/frame]
        {SOUND:HIT_AND_MISS club.ogg {SOUND_LIST:MISS} -100}
        [frame]
            image="units/lighting/EMMR_Ridingsplinter.png:50"
        [/frame]
    [/attack_anim]

	
	
[/unit_type]


