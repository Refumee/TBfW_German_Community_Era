#textdomain wesnoth-gce
[unit_type]
    id=EMMR_Summoner
    name= _ "Summoner"
    race=human
    gender=male
    image="units/lighting/Summoner.png"
    hitpoints=22
    movement_type=smallfoot
    movement=5
    experience=50
    level=1
    alignment=neutral
    advances_to=EMMR_Incubus
    cost=10
    usage=mixed fighter
    description= _ "fighter."+{SPECIAL_NOTES}+{SPECIAL_NOTES_MAGICAL}
    die_sound={SOUND_LIST:HUMAN_DIE}
{DEFENSE_ANIM "units/lighting/Summoner-defend.png" "units/lighting/Summoner.png" {SOUND_LIST:HUMAN_OLD_HIT} }
    [attack]
        name=punch
        description=_"punch"
        icon=attacks/EMMR_staff-magic.png
        type=impact
        range=melee
        damage=4
        number=1
    [/attack]
    [attack]
        name=bold
        description=_"bold"
        icon=attacks/EMMR_magic-missile.png
        type=arcane
        range=ranged
        damage=5
        number=2
    [/attack]
[attack_anim]
        [filter_attack]
            name=bold
        [/filter_attack]

        offset=0

        {MAGIC_MISSILE 11 -20}
        {MAGIC_MISSILE_STAFF_FLARE -750 600 11 -20}

        start_time=-600
        [frame]
            image="units/lighting/Summoner-attack[1,2,1].png:[100,300,200]"
        [/frame]
        # wmlscope: start ignoring
        {SOUND:HIT_AND_MISS magic-missile-[1~3].ogg magic-missile-[1~3]-miss.ogg -350}
        # wmlscope: stop ignoring
    [/attack_anim]

    [attack_anim]
        [filter_attack]
            name=punch
        [/filter_attack]
        start_time=-250
        [frame]
            image="units/lighting/Summoner.png:50"
        [/frame]
        [frame]
            image="units/lighting/Summoner-attack.png:[100]"
        [/frame]
        {SOUND:HIT_AND_MISS fist.ogg staff-miss.ogg -125}
        [frame]
            image="units/lighting/Summoner-attack.png:50"
        [/frame]
        [frame]
            image="units/lighting/Summoner.png:50"
        [/frame]
    [/attack_anim]
[/unit_type]

