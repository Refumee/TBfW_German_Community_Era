#textdomain wesnoth-gce
[unit_type]
    id=EMMR_Succubus
    name= _ "Succubus"
    race=human
    gender=female
    image="units/lighting/Succubus.png"
    hitpoints=32
    movement_type=fly
    movement=5
    experience=70
    level=2
    alignment=neutral
    advances_to=EMMR_Archsuccubus
    cost=20
    usage=mixed fighter
    description= _ "Succubus. Resists fire."
    die_sound={SOUND_LIST:HUMAN_FEMALE_DIE}
{DEFENSE_ANIM "units/lighting/Succubus-defend.png" "units/lighting/Succubus.png" {SOUND_LIST:HUMAN_FEMALE_HIT} }
	[resistance]
		fire=80
		cold=100
		arcane=100
    [/resistance]
		
	[attack]
        name=seduce
        description=_"seduce"
		icon=attacks/EMMR_staff-magic.png
        type=fire
        range=melee
		[specials]
			[attacks]
			id=weapon_charm2
			name= _ "charm"
			name_inactive= _ "charm"
			description= _ "A living male unit affected by this spell will become an ally. Does not affect enemy leaders." 
			description_inactive= _ "A living male unit affected by this spell will become an ally. Does not affect enemy leaders."  
			apply_to=opponent
			value=0
			active_on=offense
			apply_to=opponent
			[/attacks]
		    [chance_to_hit]
			id=allurechance
			name= _ ""
			description= _ "This attack always has a 40% chance to hit regardless of the defensive ability of the unit being attacked."
			value=40
			cumulative=no
			[/chance_to_hit]
	[/specials]	
        damage=1
        number=1
    [/attack]

    [attack]
        name=whisp_attack
        description=_"whisp attack"
		icon=attacks/EMMR_staff-magic.png
        type=fire
        range=ranged
        [specials]
            {WEAPON_SPECIAL_MAGICAL}
        [/specials]		
        damage=4
        number=5
    [/attack]	
   
    [attack_anim]
        [filter_attack]
            name=whisp_attack
        [/filter_attack]      
        start_time=-800
        [frame]
            image="units/lighting/Succubus.png:75"
        [/frame]
        [frame]
            image="units/lighting/Succubus-wisp-attack[1~3].png:[250,200,200]"
            sound=wail-sml.wav
        [/frame]
        [frame]
            image="units/lighting/Succubus.png:75"
        [/frame]
    [/attack_anim]
	
	[attack_anim]
        [filter_attack]
            name=seduce
        [/filter_attack]      
        start_time=-800
        [frame]
            image="units/lighting/Succubus.png:50"
            sound=kiss.wav
        [/frame]
        [frame]
            image="units/lighting/Succubus-seduce[1,2].png:[450,250]"
        [/frame]
        [frame]
            image="units/lighting/Succubus.png:50"
        [/frame]
    [/attack_anim]
{EMMR_SEDUCE}   
		
[/unit_type]


