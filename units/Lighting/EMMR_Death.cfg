#textdomain wesnoth-gce
[unit_type]
	id=EMMR_Death
	name= _ "Death"
	race=human
	gender=male
	image="units/lighting/EMMR_Death.png"
	hitpoints=122
	movement_type=smallfoot
	movement=5
	experience=180
	level=7
	alignment=neutral
	advances_to=null
	{AMLA_DEFAULT}
	cost=200
	usage=fighter
	description= _ "Death. High resistances against blade."
	die_sound={SOUND_LIST:HUMAN_DIE}
{DEFENSE_ANIM "units/lighting/EMMR_Death-defend.png" "units/lighting/EMMR_Death.png" {SOUND_LIST:HUMAN_OLD_HIT} }
	[resistance]
		blade=30
		impact=120
		cold=70
	[/resistance]
	
	[standing_anim]
		start_time=0
		[frame]
			image="units/lighting/EMMR_Death.png:[150]"
		[/frame]
		[frame]
			image="units/lighting/EMMR_Death-stand[1~5].png:[150*5]"
		[/frame]
	[/standing_anim]
	
	[attack]
		name=deathlance
		description=_"Deathlance"
		icon=attacks/EMMR_staff-magic.png
		type=pierce
		[specials]
			{WEAPON_SPECIAL_EMMR_DISTANT_ATTACK}
		[/specials]
		range=ranged
		damage=7
		number=4
	[/attack]	
	
	[attack]
		name=reap
		description=_"Reap"
		icon=attacks/EMMR_staff-magic.png
		type=blade
		range=melee
		damage=14
		number=5
	[/attack]

	[attack_anim]
		[filter_attack]
			name=deathlance
		[/filter_attack]
		start_time=-350
		[frame]
			image="units/lighting/EMMR_Death.png:50"
		[/frame]
		[frame]
			image="units/lighting/EMMR_Death-spear[1~5].png:[100*5]"
		[/frame]
		{SOUND:HIT_AND_MISS spear.ogg {SOUND_LIST:MISS} -100}
		[frame]
			image="units/lighting/EMMR_Death.png:50"
		[/frame]
	[/attack_anim]
	
	[attack_anim]
		[filter_attack]
			name=reap
		[/filter_attack]
		start_time=-150
		[frame]
			image="units/lighting/EMMR_Death.png:50"
		[/frame]
		[frame]
			image="units/lighting/EMMR_Death-reap.png:[100]"
		[/frame]
		{SOUND:HIT_AND_MISS sword-1.ogg {SOUND_LIST:MISS} -100}
		[frame]
			image="units/lighting/EMMR_Death.png:50"
		[/frame]
	[/attack_anim]
		
[/unit_type]


