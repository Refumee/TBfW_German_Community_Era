#textdomain wesnoth-gce
[unit_type]
	id=EMMR_Sorceress
	name= _ "Sorceress"
	race=human
	gender=female
	image="units/lighting/EMMR_Sorceress.png"
	hitpoints=42
	movement_type=smallfoot
	movement=5
	experience=90
	level=3
	alignment=neutral
	advances_to=EMMR_Dryad
	cost=40
	usage=healer
	description= _ "Sorceress. Resists arcane. 
					Heals nearby units up to +6hp or cures poison"
	die_sound={SOUND_LIST:HUMAN_FEMALE_DIE}
{DEFENSE_ANIM "units/lighting/EMMR_Sorceress-defend.png" "units/lighting/EMMR_Sorceress.png" {SOUND_LIST:HUMAN_FEMALE_HIT} }
	[resistance]
		arcane=80
		blade=100
	[/resistance]
	
	[standing_anim]
		start_time=0
		[frame]
			image="units/lighting/EMMR_Sorceress-melee[1~8].png:[150*8]"
		[/frame]
	[/standing_anim]
	
	[abilities]
		{ABILITY_EMMR_GREAT_HEAL}
	[/abilities]

	[attack]
		name=elemental_bold
		description=_"Elemental bold"
		icon=attacks/EMMR_staff-magic.png
		type=arcane
		range=ranged	
		damage=6
		number=2
	[/attack]	
	
	[attack]
		name=elemental_twist
		description=_"Elemental twist"
		icon=attacks/EMMR_staff-magic.png
		[specials]
		{WEAPON_SPECIAL_SLOW}
		[/specials]
		type=arcane
		range=melee	
		damage=6
		number=4
	[/attack]	
	
	[attack_anim]
		[filter_attack]
			name=elemental_bold
		[/filter_attack]	  
		start_time=-700
		[frame]
			image="units/lighting/EMMR_Sorceress.png:50"
		[/frame]
		[frame]
			image="units/lighting/EMMR_Sorceress-attack[1~4].png:[150,150,150,150]"
			sound=zap.wav
		[/frame]
		[frame]
			image="units/lighting/EMMR_Sorceress.png:50"
		[/frame]
	[/attack_anim]	
	
	[attack_anim]
		[filter_attack]
			name=elemental_twist
		[/filter_attack]	  
		start_time=-1400
		[frame]
			image="units/lighting/EMMR_Sorceress.png:50"
		[/frame]
		[frame]
			image="units/lighting/EMMR_Sorceress-melee[1~8].png:[150,150,150,150,150,150,150,150]"
			sound=zap.wav
		[/frame]
		[frame]
			image="units/lighting/EMMR_Sorceress.png:50"
		[/frame]
	[/attack_anim]
		
[/unit_type]


