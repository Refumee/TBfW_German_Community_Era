#textdomain wesnoth-gce
[unit_type]
	id=EMMR_Queen
	name= _ "Queen"
	race=human
	gender=female
	image="units/lighting/EMMR_Queen.png"
	hitpoints=55
	movement_type=smallfoot
	movement=5
	experience=110
	level=4
	alignment=neutral
	advances_to=EMMR_Highqueen
	cost=80
	usage=mixed fighter
	description= _ "Queen. Resists arcane and cold. Gives all your nearby units 15% more damage for each lvl of the attacking unit.
	I am the Queen. Bow to me or die!"
	die_sound={SOUND_LIST:HUMAN_FEMALE_DIE}
{DEFENSE_ANIM "units/lighting/EMMR_Queen-defend.png" "units/lighting/EMMR_Queen.png" {SOUND_LIST:HUMAN_FEMALE_HIT} }
	[resistance]
		fire=100
		cold=70
		arcane=60
	[/resistance]
	
	[abilities]
		{ABILITY_EMMR_QUEEN_LEADERSHIP}
	[/abilities]
	
	[standing_anim]
		start_time=0
		[frame]
			image="units/lighting/EMMR_Queen.png:[100]"
		[/frame]
		[frame]
			image="units/lighting/EMMR_Queen-stand[1~6].png:[100*6]"
		[/frame]
		[frame]
			image="units/lighting/EMMR_Queen.png:[100]"
		[/frame]
	[/standing_anim]

	[attack]
		name=spikes
		description=_"Spikes"
		icon=attacks/EMMR_staff-magic.png
		type=cold
		range=melee	
		damage=4
		number=4
	[/attack]

	[attack]
		name=icicle
		description=_"Icicle"
		icon=attacks/EMMR_staff-magic.png
		type=cold
		range=ranged	
		damage=9
		number=4
	[/attack]	
	
	[attack_anim]
		[filter_attack]
			name=spikes
		[/filter_attack]	  
		start_time=-350
		[frame]
			image="units/lighting/EMMR_Queen.png:50"
		[/frame]
		[frame]
			image="units/lighting/EMMR_Queen-attack[1~6].png:[100*6]"
			sound=ice.wav
		[/frame]
		[frame]
			image="units/lighting/EMMR_Queen.png:50"
		[/frame]
	[/attack_anim]
	
	[attack_anim]
		[filter_attack]
			name=icicle
		[/filter_attack]	  
		start_time=-750
		[frame]
			image="units/lighting/EMMR_Queen.png:50"
		[/frame]
		[frame]
			image="units/lighting/EMMR_Queen-ice[1~10].png:[100*10]"
			sound=ice.wav
		[/frame]
		[frame]
			image="units/lighting/EMMR_Queen.png:50"
		[/frame]
	[/attack_anim]
		
[/unit_type]


