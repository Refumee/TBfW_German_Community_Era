#textdomain wesnoth-gce
[unit_type]
	id=EMMR_Assaulter
	name= _ "Assaulter"
	race=human
	gender=male
	image="units/lighting/Assaulter.png"
	hitpoints=32
	movement_type=mounted
	movement=8
	experience=70
	level=2
	alignment=neutral
	advances_to=EMMR_Heavy_Assault
	cost=20
	usage=scout
	description= _ "Assaulter."
	die_sound={SOUND_LIST:HUMAN_DIE}
{DEFENSE_ANIM "units/lighting/Assaulter.png" "units/lighting/Assaulter.png" {SOUND_LIST:HORSE_HIT} }
	[resistance]
		blade=80
		impact=120
		cold=90
	[/resistance]
	
	[abilities]
		{ABILITY_SKIRMISHER}
	[/abilities]


	[attack]
		name=trample
		description=_"trample"
		icon=attacks/EMMR_staff-magic.png
		type=impact
		[specials]
			{WEAPON_SPECIAL_EMMR_DISTANT_ATTACK}
		[/specials]
		range=melee
		damage=5
		number=2
	[/attack]
	
	[attack]
		name=close_combat
		description=_"close combat"
		icon=attacks/EMMR_staff-magic.png
		type=blade
		range=melee
		damage=6
		number=3
	[/attack]

	[attack_anim]
		[filter_attack]
			name=trample
		[/filter_attack]
		start_time=-250
		[frame]
			image="units/lighting/Assaulter.png:50"
		[/frame]
		[frame]
			image="units/lighting/Assaulter-trample[1,2,1].png:[100,300,200]"
		[/frame]
		{SOUND:HIT_AND_MISS horse-canter.wav {SOUND_LIST:MISS} -100}
		[frame]
			image="units/lighting/Assaulter.png:50"
		[/frame]
	[/attack_anim]
	
	[attack_anim]
		[filter_attack]
			name=close_combat
		[/filter_attack]
		start_time=-250
		[frame]
			image="units/lighting/Assaulter.png:50"
		[/frame]
		[frame]
			image="units/lighting/Assaulter-sword[1~3].png:[100,300,200]"
		[/frame]
		{SOUND:HIT_AND_MISS {SOUND_LIST:SWORD_SWISH} {SOUND_LIST:MISS} -100}
		[frame]
			image="units/lighting/Assaulter.png:50"
		[/frame]
	[/attack_anim]
	
[/unit_type]


