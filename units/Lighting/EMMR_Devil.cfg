#textdomain wesnoth-gce
[unit_type]
	id=EMMR_Devil
	name= _ "Devil"
	race=human
	gender=male
	image="units/lighting/EMMR_Devil.png"
	hitpoints=94
	movement_type=fly
	movement=5
	experience=150
	level=6
	alignment=neutral
	advances_to=EMMR_Lucifer
	cost=160
	usage=mixed fighter
	description= _ "Devil. Resists cold and arcane."
	die_sound={SOUND_LIST:HUMAN_DIE}
{DEFENSE_ANIM "units/lighting/EMMR_Devil-defend.png" "units/lighting/EMMR_Devil.png" {SOUND_LIST:HUMAN_HIT} }
	[resistance]
		fire=100
		cold=50
		arcane=90
	[/resistance]
	
	[abilities]
		{ABILITY_CONCEALMENT}
	[/abilities]
	
	[standing_anim]
		start_time=0
		[frame]
			image="units/lighting/EMMR_Devil-stand[1~11].png:[100*11]"
		[/frame]
	[/standing_anim]

	[attack]
		name=dualzaps
		description=_"Dualzaps"
		icon=attacks/EMMR_staff-magic.png
		type=arcane
		range=ranged	
		damage=7
		number=3
	[/attack]	
	
	[attack]
		name=lightningball
		description=_"Lightningball"
		icon=attacks/EMMR_staff-magic.png
		type=arcane
		range=melee	
		damage=11
		number=5
	[/attack]	
	
	[attack_anim]
		[filter_attack]
			name=dualzaps
		[/filter_attack]	  
		start_time=-450
		[frame]
			image="units/lighting/EMMR_Devil.png:50"
		[/frame]
		[frame]
			image="units/lighting/EMMR_Devil-dual[1~6].png:[100*6]"
			sound=zap.wav
		[/frame]
		[frame]
			image="units/lighting/EMMR_Devil.png:50"
		[/frame]
	[/attack_anim]	
	
	[attack_anim]
		[filter_attack]
			name=lightningball
		[/filter_attack]	  
		start_time=-350
		[frame]
			image="units/lighting/EMMR_Devil.png:50"
		[/frame]
		[frame]
			image="units/lighting/EMMR_Devil-fuse[1~3].png:[100*3]"
			sound=crystal.wav
		[/frame]
		[frame]
			image="units/lighting/EMMR_Devil.png:50"
		[/frame]
	[/attack_anim]	
		
[/unit_type]


