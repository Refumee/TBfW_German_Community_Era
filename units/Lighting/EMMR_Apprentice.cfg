#textdomain wesnoth-gce
[unit_type]
    id=EMMR_Apprentice
    name= _ "Apprentice"
    race=human
    gender=male,female
    image="units/lighting/apprentice.png"
    hitpoints=15
    movement_type=smallfoot
    movement=5
    experience=10
    level=0
    alignment=neutral
	advances_to=EMMR_Doctor,EMMR_Magi,EMMR_Summoner
    cost=5
    usage=mixed fighter
    description= _ "fighter."+{SPECIAL_NOTES}+{SPECIAL_NOTES_MAGICAL}
    die_sound={SOUND_LIST:HUMAN_DIE}
{DEFENSE_ANIM "units/lighting/apprentice-defend.png" "units/lighting/apprentice.png" {SOUND_LIST:HUMAN_OLD_HIT} }
    [attack]
        name=staff
        description=_"staff"
        icon=attacks/EMMR_staff-magic.png
        type=impact
        range=melee
        damage=3
        number=1
    [/attack]
	
    [attack]
        name=spit
        description=_"spit"
        icon=attacks/EMMR_magic-missile.png
        type=impact
        range=ranged
        damage=3
        number=2
    [/attack]
	
	[attack_anim]
        [filter_attack]
            name=spit
        [/filter_attack]

        offset=0

        start_time=-800
        [frame]
            image="units/lighting/apprentice-attack-magic.png:[100]"
        [/frame]
    [/attack_anim]

    [attack_anim]
        [filter_attack]
            name=staff
        [/filter_attack]
        start_time=-250
        [frame]
            image="units/lighting/apprentice.png:50"
        [/frame]
        [frame]
            image="units/lighting/apprentice-attack-staff[1~2].png:[100,200]"
        [/frame]
        {SOUND:HIT_AND_MISS staff.ogg staff-miss.ogg -125}
        [frame]
            image="units/lighting/apprentice-attack-magic.png:50"
        [/frame]
        [frame]
            image="units/lighting/apprentice.png:50"
        [/frame]
    [/attack_anim]
       
    [female]
        name= _ "female^Apprentice"
        gender=female
        image="units/lighting/apprentice+female.png"
		advances_to=EMMR_Caretaker
        die_sound={SOUND_LIST:HUMAN_FEMALE_DIE} 
{DEFENSE_ANIM "units/lighting/apprentice+female-defend.png" "units/lighting/apprentice+female.png" {SOUND_LIST:HUMAN_FEMALE_HIT} }
[attack_anim]
        [filter_attack]
            name=spit
        [/filter_attack]

        offset=0


        start_time=-800
        [frame]
            image="units/lighting/apprentice+female-magattack.png:[100]"
        [/frame]

    [/attack_anim]

    [attack_anim]
        [filter_attack]
            name=staff
        [/filter_attack]
        start_time=-250
        [frame]
            image="units/lighting/apprentice+female.png:50"
        [/frame]
        [frame]
            image="units/lighting/apprentice+female-attack.png:[100]"
        [/frame]
        {SOUND:HIT_AND_MISS staff.ogg staff-miss.ogg -125}
        [frame]
            image="units/lighting/apprentice+female-magattack.png:50"
        [/frame]
        [frame]
            image="units/lighting/apprentice+female.png:50"
        [/frame]
    [/attack_anim]

    
    [/female]
[/unit_type]

