#textdomain wesnoth-gce
[unit_type]
	id=EMMR_Blazemage
	name= _ "Blazemage"
	race=human
	gender=male
	image="units/lighting/EMMR_Blazemage.png"
	hitpoints=72
	movement_type=smallfoot
	movement=5
	experience=130
	level=5
	alignment=neutral
	advances_to=EMMR_Fireelementar
	cost=120
	usage=mixed fighter
	description= _ "Blazemage. Resists to fire. Weak to cold and imact."
	die_sound={SOUND_LIST:HUMAN_DIE}
{DEFENSE_ANIM "units/lighting/EMMR_Blazemage-defend.png" "units/lighting/EMMR_Blazemage.png" {SOUND_LIST:HUMAN_HIT} }
	[resistance]
		fire=50
		cold=140
		arcane=100
		pierce=100
		blade=100
		impact=130
	[/resistance]
	
	[standing_anim]
		start_time=0
		[frame]
			image="units/lighting/EMMR_Blazemage.png:[150]"
		[/frame]
		[frame]
			image="units/lighting/EMMR_Blazemage-stand[2,1,2].png:[150*3]"
		[/frame]
	[/standing_anim]
	
	[attack]
		name=firetrail
		description=_"Firetrail"
		icon=attacks/EMMR_staff-magic.png
		[specials]
		{WEAPON_SPECIAL_MAGICAL}
		[/specials]
		type=fire
		range=ranged	
		damage=12
		number=4
	[/attack]	
	
	[attack]
		name=burn_hit
		description=_"Burn hit"
		icon=attacks/EMMR_staff-magic.png
		type=fire
		range=melee	
		damage=7
		number=3
	[/attack]

	[attack_anim]
		[filter_attack]
			name=firetrail
		[/filter_attack]	  
		start_time=-800
		[frame]
			image="units/lighting/EMMR_Blazemage.png:50"
		[/frame]
		[frame]
			image="units/lighting/EMMR_Blazemage-firetrail[1~5].png:[100*5]"
			sound=fire.wav
		[/frame]
		[frame]
			image="units/lighting/EMMR_Blazemage.png:50"
		[/frame]
	[/attack_anim]	
	
	[attack_anim]
		[filter_attack]
			name=burn_hit
		[/filter_attack]	  
		start_time=-250
		[frame]
			image="units/lighting/EMMR_Blazemage.png:50"
		[/frame]
		[frame]
			image="units/lighting/EMMR_Blazemage-attack[2,3,1].png:[100*3]"
			sound=fire.wav
		[/frame]
		[frame]
			image="units/lighting/EMMR_Blazemage.png:50"
		[/frame]
	[/attack_anim]
{EMMR_SEDUCE}   
		
[/unit_type]


