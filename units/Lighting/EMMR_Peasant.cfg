#textdomain wesnoth-gce
[unit_type]
    id=EMMR_Pea
    name= _ "Pea"
    race=human
    gender=male
    image="units/lighting/Peasant.png"
    hitpoints=15
    movement_type=smallfoot
    movement=4
    experience=10
    level=0
    alignment=neutral
    advances_to=EMMR_Spearfighter,EMMR_Clubman,EMMR_Swordfighter,EMMR_Archer,EMMR_Raider
    cost=5
    usage=fighter
    description= _ "fighter."
    die_sound={SOUND_LIST:HUMAN_DIE}
{DEFENSE_ANIM "units/lighting/Peasant-defend.png" "units/lighting/Peasant.png" {SOUND_LIST:HUMAN_OLD_HIT} }
    [attack]
        name=fork
        description=_"fork"
        icon=attacks/EMMR_staff-magic.png
        type=impact
        range=melee
        damage=6
        number=1
    [/attack]
    [attack]
        name=throw_stones
        description=_"throw_stones"
        icon=attacks/EMMR_magic-missile.png
        type=impact
        range=ranged
        damage=2
        number=2
    [/attack]
[attack_anim]
        [filter_attack]
            name=throw_stones
        [/filter_attack]

        offset=0
        start_time=-800
        [frame]
            image="units/lighting/Peasant-attack.png:[100]"
			sound=throw-1.wav
        [/frame]
    [/attack_anim]

    [attack_anim]
        [filter_attack]
            name=fork
        [/filter_attack]
        start_time=-250
        [frame]
            image="units/lighting/Peasant.png:50"
        [/frame]
        [frame]
            image="units/lighting/Peasant-attack.png:[100]"
        [/frame]
        {SOUND:HIT_AND_MISS spear.ogg spear-miss.ogg -125}
        [frame]
            image="units/lighting/Peasant.png:50"
        [/frame]
    [/attack_anim]

[/unit_type]

