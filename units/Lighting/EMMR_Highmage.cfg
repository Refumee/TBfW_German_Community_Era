#textdomain wesnoth-gce
[unit_type]
    id=EMMR_Highmage
    name= _ "Highmage"
    race=human
    gender=male
    image="units/lighting/EMMR_Highmage.png"
    hitpoints=42
    movement_type=smallfoot
    movement=5
    experience=90
    level=3
    alignment=neutral
    advances_to=EMMR_Icemage,EMMR_Firemage
    cost=40
    usage=mixed fighter
    description= _ "Highmage."
    die_sound={SOUND_LIST:HUMAN_DIE}
{DEFENSE_ANIM "units/lighting/EMMR_Highmage-defend.png" "units/lighting/EMMR_Highmage.png" zap.wav }
	[resistance]
		fire=80
		cold=80
    [/resistance]

    [attack]
        name=lightning_storm
        description=_"lightning storm"
		icon=attacks/EMMR_staff-magic.png
		[specials]
		{WEAPON_SPECIAL_SLOW}
		[/specials]
        type=arcane
        range=ranged	
        damage=11
        number=3
    [/attack]	
	
	[attack]
        name=zap
        description=_"zap"
		icon=attacks/EMMR_staff-magic.png
        type=arcane
        range=melee	
        damage=5
        number=3
    [/attack]

	[attack_anim]
        [filter_attack]
            name=lightning_storm
        [/filter_attack]      
        start_time=-500
        [frame]
            image="units/lighting/EMMR_Highmage.png:50"
        [/frame]
        [frame]
            image="units/lighting/EMMR_Highmage-attack[1,2].png:[250,150]"
            sound=zap.wav
        [/frame]
        [frame]
            image="units/lighting/EMMR_Highmage.png:50"
        [/frame]
    [/attack_anim]	
	
	[attack_anim]
        [filter_attack]
            name=zap
        [/filter_attack]      
        start_time=-600
        [frame]
            image="units/lighting/EMMR_Highmage.png:50"
        [/frame]
        [frame]
            image="units/lighting/EMMR_Highmage-attack1.png:[500]"
            sound=zap.wav
        [/frame]
        [frame]
            image="units/lighting/EMMR_Highmage.png:50"
        [/frame]
    [/attack_anim]
{EMMR_SEDUCE}   
		
[/unit_type]


