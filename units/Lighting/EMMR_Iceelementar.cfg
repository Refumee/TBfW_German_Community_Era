#textdomain wesnoth-gce
[unit_type]
	id=EMMR_Iceelementar
	name= _ "Iceelementar"
	race=human
	gender=male
	image="units/lighting/EMMR_Iceelementar.png"
	hitpoints=94
	movement_type=smallfoot
	movement=5
	experience=150
	level=6
	alignment=neutral
	advances_to=EMMR_Iceavatar
	cost=160
	usage=mixed fighter
	description= _ "Iceelementar. Resists to cold. Weak to fire and imact."
	die_sound={SOUND_LIST:HUMAN_DIE}
{DEFENSE_ANIM "units/lighting/EMMR_Iceelementar-defend.png" "units/lighting/EMMR_Iceelementar.png" ice.wav }
	[resistance]
		fire=140
		cold=30
		arcane=100
		pierce=100
		blade=100
		impact=130
	[/resistance]
	
	[standing_anim]
		start_time=0
		[frame]
			image="units/lighting/EMMR_Iceelementar-stand[1~9,8~1].png:[100*17]"
		[/frame]
	[/standing_anim]	
	
	[attack]
		name=icerain
		description=_"Icerain"
		icon=attacks/EMMR_staff-magic.png
		[specials]
		{WEAPON_SPECIAL_MAGICAL}
		[/specials]
		type=cold
		range=ranged	
		damage=12
		number=5
	[/attack]	
	
	[attack]
		name=icespray
		description=_"Icespray"
		icon=attacks/EMMR_staff-magic.png
		[specials]
		{WEAPON_SPECIAL_SLOW}
		[/specials]
		type=cold
		range=melee	
		damage=6
		number=4
	[/attack]

	[attack_anim]
		[filter_attack]
			name=icerain
		[/filter_attack]	  
		start_time=-275
		[frame]
			image="units/lighting/EMMR_Iceelementar.png:50"
		[/frame]
		[frame]
			image="units/lighting/EMMR_Iceelementar-rain[1~8].png:[75*8]"
			sound=ice.wav
		[/frame]
		[frame]
			image="units/lighting/EMMR_Iceelementar.png:50"
		[/frame]
	[/attack_anim]	
	
	[attack_anim]
		[filter_attack]
			name=icespray
		[/filter_attack]	  
		start_time=-750
		[frame]
			image="units/lighting/EMMR_Iceelementar.png:50"
		[/frame]
		[frame]
			image="units/lighting/EMMR_Iceelementar-spray[1~7].png:[100*7]"
			sound=ice.wav
		[/frame]
		[frame]
			image="units/lighting/EMMR_Iceelementar.png:50"
		[/frame]
	[/attack_anim]
{EMMR_SEDUCE}   
		
[/unit_type]


