#textdomain wesnoth-gce
[unit_type]
	id=EMMR_Masamune
	name= _ "Masamune"
	race=human
	gender=male
	image="units/lighting/EMMR_Masamune.png"
	hitpoints=122
	movement_type=smallfoot
	movement=5
	experience=180
	level=7
	alignment=neutral
	advances_to=null
	{AMLA_DEFAULT}
	cost=200
	usage=mixed fighter
	description= _ "Masamune. Resists arcane blade. Invisible at night"
	die_sound={SOUND_LIST:HUMAN_DIE}
{DEFENSE_ANIM "units/lighting/EMMR_Masamune-defend.png" "units/lighting/EMMR_Masamune.png" {SOUND_LIST:HUMAN_HIT} }
	[resistance]
		fire=100
		cold=100
		arcane=70
		blade=70
		impact=100
	[/resistance]
	
	[abilities]
		{ABILITY_NIGHTSTALK}
	[/abilities]
	
	[standing_anim]
		start_time=0
		[frame]
			image="units/lighting/EMMR_Masamune.png:[100]"
		[/frame]
		[frame]
			image="units/lighting/EMMR_Masamune-stand[1~4,3~1].png:[100*7]"
		[/frame]
	[/standing_anim]

	[attack]
		name=knife
		description=_"Knife"
		icon=attacks/EMMR_staff-magic.png
		[specials]
			{WEAPON_SPECIAL_POISON}
		[/specials]
		type=blade
		range=ranged	
		damage=7
		number=4
	[/attack]

	[attack]
		name=twin_strike
		description=_"Twin Strike"
		icon=attacks/EMMR_staff-magic.png
		type=blade
		range=melee	
		damage=13
		number=5
	[/attack]		
		
	[attack_anim]
		[filter_attack]
			name=knife
		[/filter_attack]	  
		start_time=-350
		[frame]
			image="units/lighting/EMMR_Masamune.png:50"
		[/frame]
		[frame]
			image="units/lighting/EMMR_Masamune-knife[1~4].png:[75*4]"
			sound=throwing-knife.ogg
		[/frame]
		[frame]
			image="units/lighting/EMMR_Masamune.png:50"
		[/frame]
	[/attack_anim]

	[attack_anim]
		[filter_attack]
			name=twin_strike
		[/filter_attack]	  
		start_time=-500
		[frame]
			image="units/lighting/EMMR_Masamune.png:50"
		[/frame]
		[frame]
			image="units/lighting/EMMR_Masamune-twinstrike[1~3].png:[150*3]"
			sound=sword-1.ogg
		[/frame]
		[frame]
			image="units/lighting/EMMR_Masamune.png:50"
		[/frame]
	[/attack_anim]		
		
[/unit_type]


