#textdomain wesnoth-gce
[unit_type]
	id=EMMR_Ridingmacer
	name= _ "Ridingmacer"
	race=human
	gender=male
	image="units/lighting/EMMR_Ridingmacer.png"
	hitpoints=72
	movement_type=mounted
	movement=5
	experience=130
	level=5
	alignment=neutral
	advances_to=EMMR_Ridingsplinter
	cost=120
	usage=fighter
	description= _ "Ridingmacer."
	die_sound={SOUND_LIST:HUMAN_DIE}
{DEFENSE_ANIM "units/lighting/EMMR_Ridingmacer-defend.png" "units/lighting/EMMR_Ridingmacer.png" {SOUND_LIST:HORSE_HIT} }
	[resistance]
		blade=100
		impact=120
		cold=80
		pierce=100
	[/resistance]
	
	[attack]
		name=trample
		description=_"trample"
		icon=attacks/EMMR_staff-magic.png
		type=impact
		[specials]
			{WEAPON_SPECIAL_EMMR_DISTANT_ATTACK}
		[/specials]
		range=melee
		damage=6
		number=3
	[/attack]
	
	[attack]
		name=mace
		description=_"Mace"
		icon=attacks/EMMR_staff-magic.png
		type=impact
		range=melee
		damage=11
		number=5
	[/attack]

	[attack_anim]
		[filter_attack]
			name=trample
		[/filter_attack]
		start_time=-150
		[frame]
			image="units/lighting/EMMR_Ridingmacer.png:50"
		[/frame]
		[frame]
			image="units/lighting/EMMR_Ridingmacer.png:[100]"
		[/frame]
		{SOUND:HIT_AND_MISS horse-canter.wav {SOUND_LIST:MISS} -100}
		[frame]
			image="units/lighting/EMMR_Ridingmacer.png:50"
		[/frame]
	[/attack_anim]
	
	[attack_anim]
		[filter_attack]
			name=mace
		[/filter_attack]
		start_time=-250
		[frame]
			image="units/lighting/EMMR_Ridingmacer.png:50"
		[/frame]
		[frame]
			image="units/lighting/EMMR_Ridingmacer-attack[1,2].png:[100*2]"
		[/frame]
		{SOUND:HIT_AND_MISS club.ogg {SOUND_LIST:MISS} -100}
		[frame]
			image="units/lighting/EMMR_Ridingmacer.png:50"
		[/frame]
	[/attack_anim]

	
	
[/unit_type]


