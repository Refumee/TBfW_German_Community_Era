#textdomain wesnoth-gce
[unit_type]
    id=EMMR_Supremeincubus
    name= _ "Supremeincubus"
    race=human
    gender=male
    image="units/lighting/EMMR_Supremeincubus.png"
    hitpoints=55
    movement_type=fly
    movement=5
    experience=110
    level=4
    alignment=neutral
    advances_to=EMMR_Incubusking
    cost=80
    usage=mixed fighter
    description= _ "Supremeincubus. Resists cold."
    die_sound={SOUND_LIST:HUMAN_DIE}
{DEFENSE_ANIM "units/lighting/EMMR_Supremeincubus-defend.png" "units/lighting/EMMR_Supremeincubus.png" {SOUND_LIST:HUMAN_HIT} }
	[resistance]
		fire=100
		cold=70
		arcane=100

    [/resistance]
	
	[abilities]
		{ABILITY_CONCEALMENT}
	[/abilities]
	
	[standing_anim]
        start_time=0
		[frame]
            image="units/lighting/EMMR_Supremeincubus.png:[100]"
        [/frame]
        [frame]
            image="units/lighting/EMMR_Supremeincubus-stand[1~13].png:[100*13]"
        [/frame]
    [/standing_anim]

    [attack]
        name=shock
        description=_"Shock"
		icon=attacks/EMMR_staff-magic.png
        type=arcane
        range=ranged	
        damage=5
        number=3
    [/attack]	
	
	[attack]
        name=claw
        description=_"Claw"
		icon=attacks/EMMR_staff-magic.png
        type=blade
        range=melee	
        damage=7
        number=5
    [/attack]	
	
	[attack_anim]
        [filter_attack]
            name=shock
        [/filter_attack]      
        start_time=-350
        [frame]
            image="units/lighting/EMMR_Supremeincubus.png:50"
        [/frame]
        [frame]
            image="units/lighting/EMMR_Supremeincubus-shock[1~5].png:[100*5]"
            sound=zap.wav
        [/frame]
        [frame]
            image="units/lighting/EMMR_Supremeincubus.png:50"
        [/frame]
    [/attack_anim]	
	
	[attack_anim]
        [filter_attack]
            name=claw
        [/filter_attack]      
        start_time=-500
        [frame]
            image="units/lighting/EMMR_Supremeincubus.png:50"
        [/frame]
        [frame]
            image="units/lighting/EMMR_Supremeincubus-attack[1~3].png:[100*3]"
            sound=claws.ogg
        [/frame]
        [frame]
            image="units/lighting/EMMR_Supremeincubus.png:50"
        [/frame]
    [/attack_anim]	
		
[/unit_type]


