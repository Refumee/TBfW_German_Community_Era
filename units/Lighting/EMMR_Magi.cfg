#textdomain wesnoth-units
[unit_type]
	id=EMMR_Magi
	name= _ "Magi"
	# wmllint: general spelling mage mages magery magecraft
	race=human
	gender=male
	image="units/lighting/mage.png"
	hitpoints=22
	movement_type=smallfoot
	movement=5
	experience=50
	level=1
	alignment=lawful
	advances_to=EMMR_Arcmage
	cost=10
	usage=mixed fighter
	description= _ "Humans have often pondered the workings of the world in which they live. Some endeavor to take this beyond idle musing, to set it as the primary enterprise of their lives. Any magi worthy of the title have spent at least a decade in study, amassing a sum of knowledge which sets them apart from other people. These men and women, who have committed themselves fully to the pursuit of wisdom, stand in stark contrast to a world where few can even read and write. Their ranks are filled with the children of hopeful nobility, or those who sought an escape from the intellectual void of manual labor.

It is an irony that, with all their knowledge, and their unassuming monopoly thereof, the collective community of magi could likely rule society, were they ever to try. However, their true love is neither money, nor power, and those who see the study of magic as a means to such ends often lack the very conviction required for true mastery.

Physically frail, and lacking familiarity with combat, magi do possess certain arts which are of great utility in battle."+{SPECIAL_NOTES}+{SPECIAL_NOTES_MAGICAL}
	die_sound={SOUND_LIST:HUMAN_DIE}
	{DEFENSE_ANIM "units/lighting/mage-defend.png" "units/lighting/mage.png" {SOUND_LIST:HUMAN_OLD_HIT} }
	[attack]
		name=staff
		description=_"staff"
		icon=attacks/EMMR_staff-magic.png
		type=impact
		range=melee
		damage=6
		number=1
	[/attack]
	[attack]
		name=missile
		description=_"missile"
		icon=attacks/EMMR_magic-missile.png
		type=fire
		range=ranged
		[specials]
			{WEAPON_SPECIAL_MAGICAL}
		[/specials]
		damage=6
		number=2
	[/attack]
	[idle_anim]
		{STANDARD_IDLE_FILTER}
		start_time=0
		[frame]
			image="units/lighting/mage-idle-[1~4,4*2,4~1].png:[150*10]"
		[/frame]
	[/idle_anim]
	[death]
		start_time=0
		[frame]
			duration=60
			image="units/lighting/mage-die-1.png"
		[/frame]
		[frame]
			duration=50
			image="units/lighting/mage-die-2.png"
		[/frame]
		[frame]
			duration=50
			image="units/lighting/mage-die-3.png"
		[/frame]
		[frame]
			duration=50
			image="units/lighting/mage-die-4.png"
		[/frame]
		[frame]
			duration=50
			image="units/lighting/mage-die-5.png"
		[/frame]
		[frame]
			duration=40
			image="units/lighting/mage-die-6.png"
		[/frame]
		[frame]
			duration=40
			image="units/lighting/mage-die-7.png"
		[/frame]
		[frame]
			duration=50
			image="units/lighting/mage-die-8.png"
		[/frame]
		[frame]
			duration=50
			image="units/lighting/mage-die-9.png"
		[/frame]
		[frame]
			duration=110
			image="units/lighting/mage-die-10.png"
		[/frame]
		[frame]
			duration=200
			image="units/lighting/mage-die-11.png"
		[/frame]
		[frame]
			duration=100
			image="units/lighting/mage-die-12.png"
		[/frame]
		[frame]
			duration=90
			image="units/lighting/mage-die-13.png"
		[/frame]
		[frame]
			duration=80
			image="units/lighting/mage-die-14.png"
		[/frame]
		[frame]
			duration=50
			image="units/lighting/mage-die-15.png"
		[/frame]
		[frame]
			duration=300
			image="units/lighting/mage-die-16.png"
		[/frame]
	[/death]
	[attack_anim]
		[filter_attack]
			name=missile
		[/filter_attack]

		offset=0

		{MAGIC_MISSILE 11 -20}
		{MAGIC_MISSILE_STAFF_FLARE -750 600 11 -20}

		start_time=-800
		[frame]
			image="units/lighting/mage-attack-magic[1,2,1].png:[100,700,200]"
		[/frame]
		# wmlscope: start ignoring
		{SOUND:HIT_AND_MISS magic-missile-[1~3].ogg magic-missile-[1~3]-miss.ogg -350}
		# wmlscope: stop ignoring
	[/attack_anim]
	[attack_anim]
		[filter_attack]
			name=staff
		[/filter_attack]
		start_time=-250
		[frame]
			image="units/lighting/mage.png:50"
		[/frame]
		[frame]
			image="units/lighting/mage-attack-staff[1~2].png:[100,200]"
		[/frame]
		{SOUND:HIT_AND_MISS staff.ogg staff-miss.ogg -125}
		[frame]
			image="units/lighting/mage-attack-magic1.png:50"
		[/frame]
		[frame]
			image="units/lighting/mage.png:50"
		[/frame]
	[/attack_anim]
  
[/unit_type]
