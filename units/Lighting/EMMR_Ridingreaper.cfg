#textdomain wesnoth-gce
[unit_type]
    id=EMMR_Ridingreaper
    name= _ "Ridingreaper"
    race=human
    gender=male
    image="units/lighting/EMMR_Ridingreaper.png"
    hitpoints=94
    movement_type=mounted
    movement=5
    experience=150
    level=6
    alignment=neutral
    advances_to=null
	{AMLA_DEFAULT}
    cost=160
    usage=fighter
    description= _ "Riding Reaper."
    die_sound={SOUND_LIST:HUMAN_DIE}
{DEFENSE_ANIM "units/lighting/EMMR_Ridingreaper-defend.png" "units/lighting/EMMR_Ridingreaper.png" {SOUND_LIST:HORSE_HIT} }
	[resistance]
        blade=70
        impact=120
        cold=80
		pierce=100
    [/resistance]
	
	[standing_anim]
        start_time=0
        [frame]
            image="units/lighting/EMMR_Ridingreaper-stand[1~5].png:[150*5]"
        [/frame]
    [/standing_anim]
	
    [attack]
        name=trample
        description=_"trample"
        icon=attacks/EMMR_staff-magic.png
        type=impact
		[specials]
			{WEAPON_SPECIAL_EMMR_DISTANT_ATTACK}
		[/specials]
        range=melee
        damage=6
        number=4
    [/attack]
	
    [attack]
        name=reap
        description=_"Reap"
        icon=attacks/EMMR_staff-magic.png
        type=pierce
        range=melee
        damage=12
        number=5
    [/attack]

    [attack_anim]
        [filter_attack]
            name=trample
        [/filter_attack]
        start_time=-250
        [frame]
            image="units/lighting/EMMR_Ridingreaper.png:50"
        [/frame]
        [frame]
            image="units/lighting/EMMR_Ridingreaper.png:[100]"
        [/frame]
        {SOUND:HIT_AND_MISS horse-canter.wav {SOUND_LIST:MISS} -100}
        [frame]
            image="units/lighting/EMMR_Ridingreaper.png:50"
        [/frame]
    [/attack_anim]
	
	[attack_anim]
        [filter_attack]
            name=reap
        [/filter_attack]
        start_time=-250
        [frame]
            image="units/lighting/EMMR_Ridingreaper.png:50"
        [/frame]
        [frame]
            image="units/lighting/EMMR_Ridingreaper-reap.png:[100]"
        [/frame]
        {SOUND:HIT_AND_MISS spear.ogg {SOUND_LIST:MISS} -100}
        [frame]
            image="units/lighting/EMMR_Ridingreaper.png:50"
        [/frame]
    [/attack_anim]

	
	
[/unit_type]


