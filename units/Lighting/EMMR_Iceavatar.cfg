#textdomain wesnoth-gce
[unit_type]
    id=EMMR_Iceavatar
    name= _ "Iceavatar"
    race=human
    gender=male
    image="units/lighting/EMMR_Iceavatar.png"
    hitpoints=122
    movement_type=smallfoot
    movement=5
    experience=180
    level=7
    alignment=neutral
    advances_to=null
	{AMLA_DEFAULT}
    cost=200
    usage=mixed fighter
    description= _ "Iceavatar. Immune to cold. Weak to fire and imact."
    die_sound={SOUND_LIST:HUMAN_DIE}
{DEFENSE_ANIM "units/lighting/EMMR_Iceavatar-defend.png" "units/lighting/EMMR_Iceavatar.png" ice.wav }
	[resistance]
		fire=150
		cold=0
		arcane=100
		pierce=100
		blade=100
		impact=130
    [/resistance]
	
    [attack]
        name=icespike
        description=_"Icespike"
		icon=attacks/EMMR_staff-magic.png
		[specials]
		{WEAPON_SPECIAL_MAGICAL}
		[/specials]
        type=cold
        range=ranged	
        damage=10
        number=7
    [/attack]	
	
	[attack]
        name=icelance
        description=_"Icelance"
		icon=attacks/EMMR_staff-magic.png
		[specials]
		{WEAPON_SPECIAL_SLOW}
		[/specials]
        type=cold
        range=melee	
        damage=7
        number=4
    [/attack]

	[attack_anim]
        [filter_attack]
            name=icespike
        [/filter_attack]      
        start_time=-275
        [frame]
            image="units/lighting/EMMR_Iceavatar.png:50"
        [/frame]
        [frame]
            image="units/lighting/EMMR_Iceavatar-spike[1~4].png:[75*4]"
            sound=ice.wav
        [/frame]
        [frame]
            image="units/lighting/EMMR_Iceavatar.png:50"
        [/frame]
    [/attack_anim]	
	
	[attack_anim]
        [filter_attack]
            name=icelance
        [/filter_attack]      
        start_time=-250
        [frame]
            image="units/lighting/EMMR_Iceavatar.png:50"
        [/frame]
        [frame]
            image="units/lighting/EMMR_Iceavatar-lance[1~3].png:[100*3]"
            sound=ice.wav
        [/frame]
        [frame]
            image="units/lighting/EMMR_Iceavatar.png:50"
        [/frame]
    [/attack_anim]
{EMMR_SEDUCE}   
		
[/unit_type]


