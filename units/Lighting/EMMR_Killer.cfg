#textdomain wesnoth-gce
[unit_type]
    id=EMMR_Killer
    name= _ "Killer"
    race=human
    gender=male
    image="units/lighting/EMMR_Killer.png"
    hitpoints=72
    movement_type=smallfoot
    movement=5
    experience=130
    level=5
    alignment=neutral
    advances_to=EMMR_Sniper
    cost=120
    usage=archer
    description= _ "Killer. Shooter"
    die_sound={SOUND_LIST:HUMAN_DIE}
{DEFENSE_ANIM "units/lighting/EMMR_Killer-defend.png" "units/lighting/EMMR_Killer.png" {SOUND_LIST:HUMAN_HIT} }


    [attack]
        name=sniping_hit
        description=_"Sniping hit"
        icon=attacks/EMMR_staff-magic.png
		[specials]
		{WEAPON_SPECIAL_MARKSMAN}
		[/specials]
        type=pierce
        range=ranged
        damage=9
        number=6
    [/attack]

    [attack_anim]
        [filter_attack]
            name=sniping_hit
        [/filter_attack]
        start_time=-350
        [frame]
            image="units/lighting/EMMR_Killer.png:50"			
        [/frame]
        [frame]
            image="units/lighting/EMMR_Killer-attack[1~3].png:[150*3]"
			sound=shot.wav
        [/frame]

        [frame]
            image="units/lighting/EMMR_Killer.png:50"
        [/frame]
    [/attack_anim]
[/unit_type]

