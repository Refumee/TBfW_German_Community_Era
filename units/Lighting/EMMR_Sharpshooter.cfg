#textdomain wesnoth-gce
[unit_type]
    id=EMMR_Sharpshooter
    name= _ "Sharpshooter"
    race=human
    gender=male
    image="units/lighting/EMMR_Sharpshooter.png"
    hitpoints=55
    movement_type=smallfoot
    movement=5
    experience=110
    level=4
    alignment=neutral
    advances_to=EMMR_Killer
    cost=80
    usage=archer
    description= _ "Sharpshooter. rapid shooter"
    die_sound={SOUND_LIST:HUMAN_DIE}
{DEFENSE_ANIM "units/lighting/EMMR_Sharpshooter-defend.png" "units/lighting/EMMR_Sharpshooter.png" {SOUND_LIST:HUMAN_HIT} }


    [attack]
        name=bullet_storm
        description=_"Bullet storm"
        icon=attacks/EMMR_staff-magic.png
		[specials]
		{WEAPON_SPECIAL_MARKSMAN}
		[/specials]
        type=pierce
        range=ranged
        damage=5
        number=9
    [/attack]
	
	[standing_anim]
        start_time=0
		[frame]
            image="units/lighting/EMMR_Sharpshooter.png:[100]"
        [/frame]
        [frame]
            image="units/lighting/EMMR_Sharpshooter-stand[1~6].png:[75*6]"
        [/frame]
    [/standing_anim]


    [attack_anim]
        [filter_attack]
            name=bullet_storm
        [/filter_attack]
        start_time=-350
        [frame]
            image="units/lighting/EMMR_Sharpshooter.png:50"			
        [/frame]
        [frame]
            image="units/lighting/EMMR_Sharpshooter-attack[1~3,2,1].png:[150*5]"
			sound=shot.wav
        [/frame]

        [frame]
            image="units/lighting/EMMR_Sharpshooter.png:50"
        [/frame]
    [/attack_anim]
[/unit_type]

