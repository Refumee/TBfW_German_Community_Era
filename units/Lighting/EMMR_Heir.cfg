#textdomain wesnoth-gce
[unit_type]
    id=EMMR_Heir
    name= _ "Heir"
    race=human
    gender=female
    image="units/lighting/EMMR_Heir.png"
    hitpoints=42
    movement_type=smallfoot
    movement=5
    experience=90
    level=3
    alignment=neutral
    advances_to=EMMR_Queen
    cost=40
    usage=mixed fighter
    description= _ "Heir. Resists arcane. Gives all your nearby units 10% more damage for each lvl of the attacking unit"
    die_sound={SOUND_LIST:HUMAN_FEMALE_DIE}
{DEFENSE_ANIM "units/lighting/EMMR_Heir-defend.png" "units/lighting/EMMR_Heir.png" {SOUND_LIST:HUMAN_FEMALE_HIT} }
	[resistance]
		fire=100
		cold=100
		arcane=60
    [/resistance]
	
	[abilities]
		{ABILITY_EMMR_HEIR_LEADERSHIP}
	[/abilities]

    [attack]
        name=heir_order
        description=_"Heir order"
		icon=attacks/EMMR_staff-magic.png
        type=arcane
        range=melee	
        damage=5
        number=2
    [/attack]

    [attack]
        name=punishment
        description=_"Punishment"
		icon=attacks/EMMR_staff-magic.png
        type=arcane
        range=ranged	
        damage=9
        number=3
    [/attack]	
	
	[attack_anim]
        [filter_attack]
            name=heir_order
        [/filter_attack]      
        start_time=-500
        [frame]
            image="units/lighting/EMMR_Heir.png:50"
        [/frame]
        [frame]
            image="units/lighting/EMMR_Heir-order.png:[450]"
            sound=die2.wav
        [/frame]
        [frame]
            image="units/lighting/EMMR_Heir.png:50"
        [/frame]
    [/attack_anim]
	
	[attack_anim]
        [filter_attack]
            name=punishment
        [/filter_attack]      
        start_time=-500
        [frame]
            image="units/lighting/EMMR_Heir.png:50"
        [/frame]
        [frame]
            image="units/lighting/EMMR_Heir-punish.png:[450]"
            sound=die2.wav
        [/frame]
        [frame]
            image="units/lighting/EMMR_Heir.png:50"
        [/frame]
    [/attack_anim]
		
[/unit_type]


