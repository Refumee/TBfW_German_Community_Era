#textdomain wesnoth-gce
[unit_type]
	id=EMMR_Angel
	name= _ "Angel"
	race=human
	gender=male
	image="units/lighting/EMMR_Angel.png"
	hitpoints=122
	movement_type=smallfoot
	movement=5
	experience=180
	level=7
	alignment=neutral
	advances_to=null
	{AMLA_DEFAULT}
	cost=200
	usage=healer
	description= _ "Angel. Resists fire, cold and arcane.  Heals your units up to 14hp or cures poison"
	die_sound={SOUND_LIST:HUMAN_DIE}
{DEFENSE_ANIM "units/lighting/EMMR_Angel-defend.png" "units/lighting/EMMR_Angel.png" {SOUND_LIST:HUMAN_OLD_HIT} }
	[resistance]
		fire=60
		cold=60
		arcane=30
	[/resistance]
	
	[abilities]
		{ABILITY_EMMR_ANGEL_HEAL}
	[/abilities]
	
	[standing_anim]
		start_time=0
		[frame]
			image="units/lighting/EMMR_Angel.png:[100]"
		[/frame]
		[frame]
			image="units/lighting/EMMR_Angel-stand[1~5,4~1].png:[100*9]"
		[/frame]
	[/standing_anim]

	[attack]
		name=holy_punishment
		description=_"Holy Punishment"
		icon=attacks/EMMR_staff-magic.png
		type=arcane
		range=ranged	
		damage=13
		number=5
	[/attack]	
	
	[attack]
		name=holyray
		description=_"Holyray"
		icon=attacks/EMMR_staff-magic.png
		type=arcane
		range=melee	
		damage=6
		number=4
	[/attack]

	[attack_anim]
		[filter_attack]
			name=holyray
		[/filter_attack]	  
		start_time=-350
		[frame]
			image="units/lighting/EMMR_Angel.png:50"
		[/frame]
		[frame]
			image="units/lighting/EMMR_Angel-ray[1~7].png:[150*7]"
			sound=magic-holy-2.ogg
		[/frame]
		[frame]
			image="units/lighting/EMMR_Angel.png:50"
		[/frame]
	[/attack_anim]	
	
	[attack_anim]
		[filter_attack]
			name=holy_punishment
		[/filter_attack]	  
		start_time=-350
		[frame]
			image="units/lighting/EMMR_Angel.png:50"
		[/frame]
		[frame]
			image="units/lighting/EMMR_Angel-punish[1~4].png:[100*4]"
			sound=magic-holy-2.ogg
		[/frame]
		[frame]
			image="units/lighting/EMMR_Angel.png:50"
		[/frame]
	[/attack_anim]   
		
[/unit_type]


