#textdomain wesnoth-gce
[unit_type]
	id=EMMR_Archsuccubus
	name= _ "Archsuccubus"
	race=human
	gender=female
	image="units/lighting/EMMR_Archsuccubus.png"
	hitpoints=42
	movement_type=fly
	movement=5
	experience=90
	level=3
	alignment=neutral
	advances_to=EMMR_Supremesuccubus
	cost=40
	usage=mixed fighter
	description= _ "Archsuccubus. Resists fire."
	die_sound={SOUND_LIST:HUMAN_FEMALE_DIE}
{DEFENSE_ANIM "units/lighting/EMMR_Archsuccubus-defend.png" "units/lighting/EMMR_Archsuccubus.png" {SOUND_LIST:HUMAN_FEMALE_HIT} }
	[resistance]
		fire=70
		cold=100
		arcane=100
	[/resistance]
	
	[idle_anim]
		{STANDARD_IDLE_FILTER}
		start_time=0
		[frame]
			image="units/lighting/EMMR_Archsuccubus-idle[1~4,4~1,1~4,4~1].png:[100*16]"
		[/frame]
	[/idle_anim]
	
	[standing_anim]
		start_time=0
		[frame]
			image="units/lighting/EMMR_Archsuccubus.png:[100]"
		[/frame]
		[frame]
			image="units/lighting/EMMR_Archsuccubus-stand[1~4,3~1].png:[150*7]"
		[/frame]
		[frame]
			image="units/lighting/EMMR_Archsuccubus.png:[100]"
		[/frame]
	[/standing_anim]
		
	[attack]
		name=seduce
		description=_"seduce"
		icon=attacks/EMMR_staff-magic.png
		type=fire
		range=melee
		[specials]
			[attacks]
			id=weapon_charm2
			name= _ "charm"
			name_inactive= _ "charm"
			description= _ "A living male unit affected by this spell will become an ally. Does not affect enemy leaders." 
			description_inactive= _ "A living male unit affected by this spell will become an ally. Does not affect enemy leaders."  
			apply_to=opponent
			value=0
			active_on=offense
			apply_to=opponent
			[/attacks]
			[chance_to_hit]
			id=allurechance
			name= _ ""
			description= _ "This attack always has a 50% chance to hit regardless of the defensive ability of the unit being attacked."
			value=50
			cumulative=no
			[/chance_to_hit]
	[/specials]	
		damage=1
		number=1
	[/attack]

	[attack]
		name=dual_bolds
		description=_"dual bolds"
		icon=attacks/EMMR_staff-magic.png
		type=fire
		range=ranged
		[specials]
			{WEAPON_SPECIAL_MAGICAL}
		[/specials]		
		damage=10
		number=3
	[/attack]	
   
	[attack_anim]
		[filter_attack]
			name=dual_bolds
		[/filter_attack]	  
		start_time=-675
		[frame]
			image="units/lighting/EMMR_Archsuccubus.png:75"
		[/frame]
		[frame]
			image="units/lighting/EMMR_Archsuccubus-lightning[1~4].png:[150*4]"
			sound=thunder.wav
		[/frame]
		[frame]
			image="units/lighting/EMMR_Archsuccubus.png:75"
		[/frame]
	[/attack_anim]
	
	[attack_anim]
		[filter_attack]
			name=seduce
		[/filter_attack]	  
		start_time=-650
		[frame]
			image="units/lighting/EMMR_Archsuccubus.png:50"
		[/frame]
		[frame]
			image="units/lighting/EMMR_Archsuccubus-kiss[1~6].png:[100*6]"
			sound=kiss.wav
		[/frame]
		[frame]
			image="units/lighting/EMMR_Archsuccubus.png:50"
		[/frame]
	[/attack_anim]
{EMMR_SEDUCE}   
		
[/unit_type]


