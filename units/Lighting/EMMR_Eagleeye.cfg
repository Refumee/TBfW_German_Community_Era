			image_diagonal="projectiles/missile-ne.png"
		[/missile_frame]

		[frame]
			image="units/lighting/EMMR_Eagleeye.png:50"
		[/frame]
		[frame]
			image="units/lighting/EMMR_Eagleeye.png:[100]"
		[/frame]
		{SOUND:HIT_AND_MISS bow.ogg bow-miss -125}
		[frame]
			image="units/lighting/EMMR_Eagleeye.png:50"
		[/frame]
	[/attack_anim]
