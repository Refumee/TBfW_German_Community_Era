#textdomain wesnoth-gce
[unit_type]
	id=EMMR_Eagleeye
	name= _ "Eagleeye"
	race=human
	gender=male
	image="units/lighting/EMMR_Eagleeye.png"
	hitpoints=42
	movement_type=smallfoot
	movement=5
	experience=90
	level=3
	alignment=neutral
	advances_to=EMMR_Sharpshooter
	cost=40
	usage=archer
	description= _ "Eagleeye. heavy shot damage"
