#textdomain wesnoth-gce
[unit_type]
    id=EMMR_Sanctuumholder
    name= _ "Sanctuumholder"
    race=human
    gender=male
    image="units/lighting/EMMR_Sanctuumholder.png"
    hitpoints=94
    movement_type=fly
    movement=5
    experience=150
    level=6
    alignment=neutral
    advances_to=EMMR_Angel
    cost=160
    usage=healer
    description= _ "Sanctuumholder. Resists fire, cold and arcane. Heals your units up to 12hp or cures poison"
    die_sound={SOUND_LIST:HUMAN_DIE}
{DEFENSE_ANIM "units/lighting/EMMR_Sanctuumholder-defend.png" "units/lighting/EMMR_Sanctuumholder.png" {SOUND_LIST:HUMAN_OLD_HIT} }
	[resistance]
		pierce=100
		fire=70
		cold=70
		arcane=40
    [/resistance]
	
	[abilities]
		{ABILITY_EMMR_SANCTUUM_HEAL}
	[/abilities]
	
	[standing_anim]
        start_time=0
		[frame]
            image="units/lighting/EMMR_Sanctuumholder.png:[100]"
        [/frame]
		[frame]
            image="units/lighting/EMMR_Sanctuumholder-stand[1~11].png:[100*11]"
        [/frame]
    [/standing_anim]

    [attack]
        name=ionbeam
        description=_"Ionbeam"
		icon=attacks/EMMR_staff-magic.png
        type=arcane
        range=ranged	
        damage=11
        number=5
    [/attack]	
	
	[attack]
        name=ionray
        description=_"Ionray"
		icon=attacks/EMMR_staff-magic.png
        type=arcane
        range=melee	
        damage=7
        number=3
    [/attack]

	[attack_anim]
        [filter_attack]
            name=ionray
        [/filter_attack]      
        start_time=-350
        [frame]
            image="units/lighting/EMMR_Sanctuumholder.png:50"
        [/frame]
        [frame]
            image="units/lighting/EMMR_Sanctuumholder-ionray[1~5].png:[150*5]"
            sound=magic-holy-2.ogg
        [/frame]
        [frame]
            image="units/lighting/EMMR_Sanctuumholder.png:50"
        [/frame]
    [/attack_anim]	
	
	[attack_anim]
        [filter_attack]
            name=ionbeam
        [/filter_attack]      
        start_time=-350
        [frame]
            image="units/lighting/EMMR_Sanctuumholder.png:50"
        [/frame]
        [frame]
            image="units/lighting/EMMR_Sanctuumholder-ion[1~5].png:[100*5]"
            sound=magic-holy-2.ogg
        [/frame]
        [frame]
            image="units/lighting/EMMR_Sanctuumholder.png:50"
        [/frame]
    [/attack_anim]   
		
[/unit_type]


