#textdomain wesnoth-gce
[unit_type]
	id=EMMR_Icemage
	name= _ "Icemage"
	race=human
	gender=male
	image="units/lighting/EMMR_Icemage.png"
	hitpoints=55
	movement_type=smallfoot
	movement=5
	experience=110
	level=4
	alignment=neutral
	advances_to=EMMR_Frostmage
	cost=80
	usage=mixed fighter
	description= _ "Icemage. Resists cold. Weak to fire and imact."
	die_sound={SOUND_LIST:HUMAN_DIE}
{DEFENSE_ANIM "units/lighting/EMMR_Icemage-defend.png" "units/lighting/EMMR_Icemage.png" ice.wav }
	[resistance]
		fire=130
		cold=70
		arcane=100
		pierce=100
		blade=100
		impact=130
	[/resistance]
	
	[standing_anim]
		start_time=0
		[frame]
			image="units/lighting/EMMR_Icemage-attack[4,5,3].png:[150*3]"
		[/frame]
	[/standing_anim]
	
	[attack]
		name=iceberg
		description=_"Iceberg"
		icon=attacks/EMMR_staff-magic.png
		[specials]
		{WEAPON_SPECIAL_SLOW}
		[/specials]
		type=cold
		range=ranged	
		damage=10
		number=4
	[/attack]	
	
	[attack]
		name=razor_ice
		description=_"Razor ice"
		icon=attacks/EMMR_staff-magic.png
		type=cold
		range=melee	
		damage=6
		number=3
	[/attack]

	[attack_anim]
		[filter_attack]
			name=iceberg
		[/filter_attack]	  
		start_time=-1250
		[frame]
			image="units/lighting/EMMR_Icemage.png:50"
		[/frame]
		[frame]
			image="units/lighting/EMMR_Icemage-ulti[1~16].png:[75*16]"
			sound=ice.wav
		[/frame]
		[frame]
			image="units/lighting/EMMR_Icemage.png:50"
		[/frame]
	[/attack_anim]	
	
	[attack_anim]
		[filter_attack]
			name=razor_ice
		[/filter_attack]	  
		start_time=-900
		[frame]
			image="units/lighting/EMMR_Icemage.png:50"
		[/frame]
		[frame]
			image="units/lighting/EMMR_Icemage-mini[1~17].png:[50*17]"
			sound=ice.wav
		[/frame]
		[frame]
			image="units/lighting/EMMR_Icemage.png:50"
		[/frame]
	[/attack_anim]
{EMMR_SEDUCE}   
		
[/unit_type]


