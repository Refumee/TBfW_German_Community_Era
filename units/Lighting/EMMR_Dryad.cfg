#textdomain wesnoth-gce
[unit_type]
    id=EMMR_Dryad
    name= _ "Dryad"
    race=human
    gender=female
    image="units/lighting/EMMR_Dryad.png"
    hitpoints=55
    movement_type=fly
    movement=5
    experience=110
    level=4
    alignment=neutral
    advances_to=EMMR_Elementaldryad
    cost=80
    usage=healer
    description= _ "Dryad. Resists arcane and impact. 
					Heals nearby units up to +8hp or cures poison. Regenerates by 4hp each turn.
					A Naturebound Sorceress got blessed by nature 
					giving her new powers but changing her appearance"
    die_sound={SOUND_LIST:HUMAN_FEMALE_DIE}
{DEFENSE_ANIM "units/lighting/EMMR_Dryad-defend.png" "units/lighting/EMMR_Dryad.png" {SOUND_LIST:HUMAN_FEMALE_HIT} }
	[resistance]
		fire=100
		cold=100
		arcane=80
		blade=100
		impact=80
		pierce=100
    [/resistance]
	
	[standing_anim]
        start_time=0
        [frame]
            image="units/lighting/EMMR_Dryad-stand[1~6].png:[150*6]"
        [/frame]
    [/standing_anim]
	
	[abilities]
		{ABILITY_EMMR_HOLY_HEAL}
		{ABILITY_EMMR_LESS_REGENERATE}
	[/abilities]

    [attack]
        name=leafsword
        description=_"Leafsword"
		icon=attacks/EMMR_staff-magic.png
        type=blade
        range=melee	
        damage=8
        number=4
    [/attack]	
	
	[attack]
        name=nature_ball
        description=_"Nature ball"
		icon=attacks/EMMR_staff-magic.png
		[specials]
		{WEAPON_SPECIAL_SLOW}
		[/specials]
        type=arcane
        range=ranged	
        damage=6
        number=3
    [/attack]	
	
	[attack_anim]
        [filter_attack]
            name=leafsword
        [/filter_attack]      
        start_time=-400
        [frame]
            image="units/lighting/EMMR_Dryad.png:50"
        [/frame]
        [frame]
            image="units/lighting/EMMR_Dryad-attack[1~3].png:[150,150,150]"
            sound=sword-1.ogg
        [/frame]
        [frame]
            image="units/lighting/EMMR_Dryad.png:50"
        [/frame]
    [/attack_anim]	
	
	[attack_anim]
        [filter_attack]
            name=nature_ball
        [/filter_attack]      
        start_time=-650
        [frame]
            image="units/lighting/EMMR_Dryad.png:50"
        [/frame]
        [frame]
            image="units/lighting/EMMR_Dryad-magic[1~7].png:[150,150,150,150,150,150,150]"
            sound=magic-missile-1.ogg
        [/frame]
        [frame]
            image="units/lighting/EMMR_Dryad.png:50"
        [/frame]
    [/attack_anim]
		
[/unit_type]


