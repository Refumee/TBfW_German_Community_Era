#textdomain wesnoth-gce
[unit_type]
    id=EMMR_Lucifer
    name= _ "Lucifer"
    race=human
    gender=male
    image="units/lighting/EMMR_Lucifer.png"
    hitpoints=122
    movement_type=fly
    movement=5
    experience=180
    level=7
    alignment=neutral
    advances_to=null
	{AMLA_DEFAULT}
    cost=200
    usage=mixed fighter
    description= _ "Lucifer. Resists cold, arcane and fire. His fire is not normal fire... its unholy fire."
    die_sound={SOUND_LIST:HUMAN_DIE}
{DEFENSE_ANIM "units/lighting/EMMR_Lucifer-defend.png" "units/lighting/EMMR_Lucifer.png" {SOUND_LIST:HUMAN_HIT} }
	[resistance]
		fire=80
		cold=40
		arcane=80

    [/resistance]
	
	[abilities]
		{ABILITY_CONCEALMENT}
	[/abilities]
	
	[standing_anim]
        start_time=0
		[frame]
            image="units/lighting/EMMR_Lucifer.png:[700]"
        [/frame]
        [frame]
            image="units/lighting/EMMR_Lucifer-stand[1~3].png:[100*3]"
        [/frame]
    [/standing_anim]

    [attack]
        name=hellfire
        description=_"Hellfire"
		icon=attacks/EMMR_staff-magic.png
        type=arcane
        range=ranged	
        damage=6
        number=4
    [/attack]	
	
	[attack]
        name=twinfire
        description=_"Twinfire"
		icon=attacks/EMMR_staff-magic.png
        type=arcane
        range=melee	
        damage=13
        number=5
    [/attack]	
	
	[attack_anim]
        [filter_attack]
            name=hellfire
        [/filter_attack]      
        start_time=-450
        [frame]
            image="units/lighting/EMMR_Lucifer.png:50"
        [/frame]
        [frame]
            image="units/lighting/EMMR_Lucifer-ball[1~6].png:[100*6]"
            sound=fire.wav
        [/frame]
        [frame]
            image="units/lighting/EMMR_Lucifer.png:50"
        [/frame]
    [/attack_anim]	
	
	[attack_anim]
        [filter_attack]
            name=twinfire
        [/filter_attack]      
        start_time=-350
        [frame]
            image="units/lighting/EMMR_Lucifer.png:50"
        [/frame]
        [frame]
            image="units/lighting/EMMR_Lucifer-twin[1~5].png:[100*5]"
            sound=fire.wav
        [/frame]
        [frame]
            image="units/lighting/EMMR_Lucifer.png:50"
        [/frame]
    [/attack_anim]	
		
[/unit_type]


