#textdomain wesnoth-gce
[unit_type]
    id=EMMR_Cavalry
    name= _ "Cavalry"
    race=human
    gender=male
    image="units/lighting/EMMR_Cavalry.png"
    hitpoints=72
    movement_type=mounted
    movement=8
    experience=130
    level=5
    alignment=neutral
    advances_to=EMMR_Dueller
    cost=120
    usage=scout
    description= _ "Cavalry scout. Shoots, whips and horses. "
    die_sound={SOUND_LIST:HUMAN_DIE}
{DEFENSE_ANIM "units/lighting/EMMR_Cavalry-defend.png" "units/lighting/EMMR_Cavalry.png" {SOUND_LIST:HORSE_HIT} }
	[resistance]
        blade=60
        impact=100
		pierce=80
    [/resistance]
	
	[abilities]
		{ABILITY_SKIRMISHER}
	[/abilities]

    [attack]
        name=trample
        description=_"Trample"
        icon=attacks/EMMR_staff-magic.png
        type=impact
		[specials]
			{WEAPON_SPECIAL_EMMR_DISTANT_ATTACK}
		[/specials]
        range=melee
        damage=6
        number=3
    [/attack]
	
    [attack]
        name=whip
        description=_"Whip"
        icon=attacks/EMMR_staff-magic.png
        type=impact
        range=melee
        damage=7
        number=3
    [/attack]
	
	[attack]
        name=rifle
        description=_"Rifle"
        icon=attacks/EMMR_staff-magic.png
        type=pierce
        range=ranged
        damage=12
        number=4
    [/attack]
	
	[attack_anim]
        [filter_attack]
            name=whip
        [/filter_attack]
        start_time=-250
        [frame]
            image="units/lighting/EMMR_Cavalry.png:50"
        [/frame]
        [frame]
            image="units/lighting/EMMR_Cavalry-whip[1~3].png:[100*3]"
			sound=whip.wav
        [/frame]
        [frame]
            image="units/lighting/EMMR_Cavalry.png:50"
        [/frame]
    [/attack_anim]
	
	[attack_anim]
        [filter_attack]
            name=trample
        [/filter_attack]
        start_time=-150
        [frame]
            image="units/lighting/EMMR_Cavalry.png:50"
        [/frame]
        [frame]
            image="units/lighting/EMMR_Cavalry-defend.png:[100]"
        [/frame]
        {SOUND:HIT_AND_MISS horse-canter.wav {SOUND_LIST:MISS} -100}
        [frame]
            image="units/lighting/EMMR_Cavalry.png:50"
        [/frame]
    [/attack_anim]
	
	[attack_anim]
        [filter_attack]
            name=rifle
        [/filter_attack]
        start_time=-150
        [frame]
            image="units/lighting/EMMR_Cavalry.png:50"
        [/frame]
        [frame]
            image="units/lighting/EMMR_Cavalry-shot[1~3].png:[150*3]"
			sound=shot.wav
        [/frame]
        [frame]
            image="units/lighting/EMMR_Cavalry.png:50"
        [/frame]
    [/attack_anim]
	
[/unit_type]


