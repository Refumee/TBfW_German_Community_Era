#textdomain wesnoth-gce
[unit_type]
    id=EMMR_Animalexperimenter
    name= _ "Animalexperimenter"
    race=human
    gender=female
    image="units/lighting/EMMR_Animalexperimenter.png"
    hitpoints=55
    movement_type=smallfoot
    movement=5
    experience=110
    level=4
    alignment=neutral
    advances_to=EMMR_Dnacrosser
    cost=80
    usage=mixed fighter
    description= _ "Animalexperimenter. Resists blade. Ambushes. Lets mix this with that. Mhh!! I didnt expect that..."
    die_sound={SOUND_LIST:HUMAN_FEMALE_DIE}
{DEFENSE_ANIM "units/lighting/EMMR_Animalexperimenter-defend.png" "units/lighting/EMMR_Animalexperimenter.png" {SOUND_LIST:HUMAN_FEMALE_HIT} }
	[resistance]
		blade=60
    [/resistance]
	
	[abilities]
		{ABILITY_AMBUSH}
	[/abilities]
	
	[standing_anim]
        start_time=0
		[frame]
            image="units/lighting/EMMR_Animalexperimenter-stand1.png:[100]"
        [/frame]
        [frame]
            image="units/lighting/EMMR_Animalexperimenter.png:[100]"
        [/frame]
		[frame]
            image="units/lighting/EMMR_Animalexperimenter-stand2.png:[100]"
        [/frame]
		[frame]
            image="units/lighting/EMMR_Animalexperimenter.png:[100]"
        [/frame]
    [/standing_anim]

    [attack]
        name=flask_throw
        description=_"Flask throw"
		icon=attacks/EMMR_staff-magic.png
		[specials]
			{WEAPON_SPECIAL_POISON}
		[/specials]
        type=arcane
        range=ranged	
        damage=5
        number=3
    [/attack]	
	
	[attack]
        name=animal_attack
        description=_"Animal attack"
		icon=attacks/EMMR_staff-magic.png
        type=pierce
        range=melee	
        damage=12
        number=3
    [/attack]	
	
	[attack_anim]
        [filter_attack]
            name=flask_throw
        [/filter_attack]      
        start_time=-350
        [frame]
            image="units/lighting/EMMR_Animalexperimenter.png:50"
        [/frame]
        [frame]
            image="units/lighting/EMMR_Animalexperimenter-venom[1~3].png:[100*3]"
            sound=klirr.wav
        [/frame]
        [frame]
            image="units/lighting/EMMR_Animalexperimenter.png:50"
        [/frame]
    [/attack_anim] 

	[attack_anim]
        [filter_attack]
            name=animal_attack
        [/filter_attack]      
        start_time=-400
        [frame]
            image="units/lighting/EMMR_Animalexperimenter.png:50"
        [/frame]
        [frame]
            image="units/lighting/EMMR_Animalexperimenter-attack[1~5].png:[100*5]"
            sound=lion.wav
        [/frame]
        [frame]
            image="units/lighting/EMMR_Animalexperimenter.png:50"
        [/frame]
    [/attack_anim]  	
		
[/unit_type]


