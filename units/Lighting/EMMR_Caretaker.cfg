#textdomain wesnoth-gce
[unit_type]
	id=EMMR_Caretaker
	name= _ "Caretaker"
	race=human
	gender=female
	image="units/lighting/caretaker.png"
	hitpoints=22
	movement_type=smallfoot
	movement=6
	experience=50
	level=1
	alignment=neutral
	advances_to=EMMR_Enchantress,EMMR_Succubus
	cost=10
	usage=healer
	description= _ "Caretaker. Can heal your units slightly and cure poison."
	die_sound={SOUND_LIST:HUMAN_FEMALE_DIE}
{DEFENSE_ANIM "units/lighting/caretaker-defend.png" "units/lighting/caretaker.png" {SOUND_LIST:HUMAN_FEMALE_HIT} }
	[abilities]
		{ABILITY_EMMR_DOCTOR}
	[/abilities]
	[attack]
		name=staff
		description=_"staff"
		icon=attacks/EMMR_staff-magic.png
		type=impact
		range=melee
		damage=6
		number=1
	[/attack]
	[attack]
		name=holy-bold
		description=_"holy-bold"
		icon=attacks/EMMR_magic-missile.png
		type=arcane
		range=ranged
		damage=5
		number=2
	[/attack]
[attack_anim]
		[filter_attack]
			name=holy-bold
		[/filter_attack]

		offset=0
		start_time=-600
		[frame]
			image="units/lighting/caretaker-magic-[1~6].png:[100,100,100,100,100,100]"
			image="units/lighting/caretaker-magic-[6~1].png:[100,100,100,100,100,100]"
		[/frame]
		# wmlscope: start ignoring
		{SOUND:HIT_AND_MISS magic-missile-[1~3].ogg magic-missile-[1~3]-miss.ogg -350}
		# wmlscope: stop ignoring
		 [frame]
			image="units/lighting/caretaker.png:50"
		[/frame]
	[/attack_anim]

	[attack_anim]
		[filter_attack]
			name=staff
		[/filter_attack]
		start_time=-250
		[frame]
			image="units/lighting/caretaker.png:50"
		[/frame]
		[frame]
			image="units/lighting/caretaker-melee-[1~6].png:[100,100,100,100,100,100]"
		[/frame]
		{SOUND:HIT_AND_MISS staff.ogg staff-miss.ogg -125}
		[frame]
			image="units/lighting/caretaker-melee-[1~6].png:[100,100,100,100,100,100]"
		[/frame]
		[frame]
			image="units/lighting/caretaker.png:50"
		[/frame]
	[/attack_anim]
[/unit_type]

