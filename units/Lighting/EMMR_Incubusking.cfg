#textdomain wesnoth-gce
[unit_type]
	id=EMMR_Incubusking
	name= _ "Incubusking"
	race=human
	gender=male
	image="units/lighting/EMMR_Incubusking.png"
	hitpoints=72
	movement_type=fly
	movement=5
	experience=130
	level=5
	alignment=neutral
	advances_to=EMMR_Devil
	cost=120
	usage=mixed fighter
	description= _ "Incubusking. Resists cold and arcane."
	die_sound={SOUND_LIST:HUMAN_DIE}
{DEFENSE_ANIM "units/lighting/EMMR_Incubusking-defend.png" "units/lighting/EMMR_Incubusking.png" {SOUND_LIST:HUMAN_HIT} }
	[resistance]
		fire=100
		cold=60
		arcane=90

	[/resistance]
	
	[abilities]
		{ABILITY_CONCEALMENT}
	[/abilities]
	
	[standing_anim]
		start_time=0
		[frame]
			image="units/lighting/EMMR_Incubusking-stand[1~10].png:[100*10]"
		[/frame]
	[/standing_anim]

	[attack]
		name=dualbolds
		description=_"Dualbolds"
		icon=attacks/EMMR_staff-magic.png
		type=arcane
		range=ranged	
		damage=6
		number=3
	[/attack]	
	
	[attack]
		name=fuse
		description=_"Fuse"
		icon=attacks/EMMR_staff-magic.png
		type=arcane
		range=melee	
		damage=9
		number=5
	[/attack]	
	
	[attack_anim]
		[filter_attack]
			name=dualbolds
		[/filter_attack]	  
		start_time=-650
		[frame]
			image="units/lighting/EMMR_Incubusking.png:50"
		[/frame]
		[frame]
			image="units/lighting/EMMR_Incubusking-dual[1~8].png:[100*8]"
			sound=fire.wav
		[/frame]
		[frame]
			image="units/lighting/EMMR_Incubusking.png:50"
		[/frame]
	[/attack_anim]	
	
	[attack_anim]
		[filter_attack]
			name=fuse
		[/filter_attack]	  
		start_time=-350
		[frame]
			image="units/lighting/EMMR_Incubusking.png:50"
		[/frame]
		[frame]
			image="units/lighting/EMMR_Incubusking-fuse[1~4].png:[100*4]"
			sound=crystal.wav
		[/frame]
		[frame]
			image="units/lighting/EMMR_Incubusking.png:50"
		[/frame]
	[/attack_anim]	
		
[/unit_type]


