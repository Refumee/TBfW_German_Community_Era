#textdomain wesnoth-gce
[unit_type]
    id=EMMR_Samurailegend
    name= _ "Samurailegend"
    race=human
    gender=male
    image="units/lighting/EMMR_Samurailegend.png"
    hitpoints=94
    movement_type=smallfoot
    movement=5
    experience=150
    level=6
    alignment=neutral
    advances_to=EMMR_Masamune
    cost=160
    usage=mixed fighter
    description= _ "Samurailegend. Resists arcane. Invisible at night"
    die_sound={SOUND_LIST:HUMAN_DIE}
{DEFENSE_ANIM "units/lighting/EMMR_Samurailegend-defend.png" "units/lighting/EMMR_Samurailegend.png" {SOUND_LIST:HUMAN_HIT} }
	[resistance]
		fire=100
		cold=100
		arcane=70
		blade=100
		impact=100
    [/resistance]
	
	[abilities]
		{ABILITY_NIGHTSTALK}
	[/abilities]
	
	[standing_anim]
        start_time=0
		[frame]
            image="units/lighting/EMMR_Samurailegend.png:[100]"
        [/frame]
        [frame]
            image="units/lighting/EMMR_Samurailegend-stand[1~4,3~1].png:[100*7]"
        [/frame]
    [/standing_anim]

    [attack]
        name=knife
        description=_"Knife"
		icon=attacks/EMMR_staff-magic.png
		[specials]
			{WEAPON_SPECIAL_POISON}
		[/specials]
        type=blade
        range=ranged	
        damage=6
        number=4
    [/attack]

    [attack]
        name=dual_katana
        description=_"Dual Katana"
		icon=attacks/EMMR_staff-magic.png
        type=blade
        range=melee	
        damage=9
        number=6
    [/attack]		
		
	[attack_anim]
        [filter_attack]
            name=knife
        [/filter_attack]      
        start_time=-275
        [frame]
            image="units/lighting/EMMR_Samurailegend.png:50"
        [/frame]
        [frame]
            image="units/lighting/EMMR_Samurailegend-knife[1~5].png:[75*5]"
            sound=throwing-knife.ogg
        [/frame]
        [frame]
            image="units/lighting/EMMR_Samurailegend.png:50"
        [/frame]
    [/attack_anim]

	[attack_anim]
        [filter_attack]
            name=dual_katana
        [/filter_attack]      
        start_time=-500
        [frame]
            image="units/lighting/EMMR_Samurailegend.png:50"
        [/frame]
        [frame]
            image="units/lighting/EMMR_Samurailegend-attack[1,2].png:[150,75]"
            sound=sword-1.ogg
        [/frame]
		[frame]
            image="units/lighting/EMMR_Samurailegend-attack[2,3].png:[75,150]"
            sound=sword-1.ogg
        [/frame]
        [frame]
            image="units/lighting/EMMR_Samurailegend.png:50"
        [/frame]
    [/attack_anim]		
		
[/unit_type]


