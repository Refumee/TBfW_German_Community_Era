#textdomain wesnoth-gce
[unit_type]
    id=EMMR_Gaea
    name= _ "Gaea"
    race=human
    gender=female
    image="units/lighting/EMMR_Gaea.png"
    hitpoints=122
    movement_type=fly
    movement=5
    experience=180
    level=7
    alignment=neutral
    advances_to=null
	{AMLA_DEFAULT}
    cost=200
    usage=healer
    description= _ "Gaea. Resists arcane and impact. 
					Heals nearby units up to +14hp or cures poison. Regenerates by 8hp each turn.
					Im Gaea. Who are you?"
    die_sound={SOUND_LIST:HUMAN_FEMALE_DIE}
{DEFENSE_ANIM "units/lighting/EMMR_Gaea-defend.png" "units/lighting/EMMR_Gaea.png" {SOUND_LIST:HUMAN_FEMALE_HIT} }
	[resistance]
		fire=100
		cold=100
		arcane=50
		blade=100
		impact=50
		pierce=100
    [/resistance]
	
	[standing_anim]
        start_time=0
        [frame]
            image="units/lighting/EMMR_Gaea-stand[1~6].png:[100*6]"
        [/frame]
    [/standing_anim]
	
	[abilities]
		{ABILITY_EMMR_ANGEL_HEAL}
		{ABILITY_EMMR_HIGH_REGENERATE}
	[/abilities]

    [attack]
        name=razorsword
        description=_"Razorsword"
		icon=attacks/EMMR_staff-magic.png
        type=blade
        range=melee	
        damage=14
        number=4
    [/attack]	
	
	[attack]
        name=natureranks
        description=_"Natureranks"
		icon=attacks/EMMR_staff-magic.png
		[specials]
		{WEAPON_SPECIAL_SLOW}
		[/specials]
        type=arcane
        range=ranged	
        damage=7
        number=4
    [/attack]	
	
	[attack_anim]
        [filter_attack]
            name=razorsword
        [/filter_attack]      
        start_time=-350
        [frame]
            image="units/lighting/EMMR_Gaea.png:50"
        [/frame]
        [frame]
            image="units/lighting/EMMR_Gaea-sword[1~2].png:[150*2]"
            sound=sword-1.ogg
        [/frame]
        [frame]
            image="units/lighting/EMMR_Gaea.png:50"
        [/frame]
    [/attack_anim]	
	
	[attack_anim]
        [filter_attack]
            name=natureranks
        [/filter_attack]      
        start_time=-650
        [frame]
            image="units/lighting/EMMR_Gaea.png:50"
        [/frame]
        [frame]
            image="units/lighting/EMMR_Gaea-entangle[1~4].png:[150*4]"
            sound=entangle.wav
        [/frame]
        [frame]
            image="units/lighting/EMMR_Gaea.png:50"
        [/frame]
    [/attack_anim]
		
[/unit_type]


