#textdomain wesnoth-gce
[unit_type]
    id=EMMR_Noble
    name= _ "Noble"
    race=human
    gender=female
    image="units/lighting/Noble.png"
    hitpoints=22
    movement_type=smallfoot
    movement=5
    experience=50
    level=1
    alignment=neutral
    advances_to=EMMR_Princess
    cost=10
    usage=mixed fighter
    description= _ "Noble. Resists arcane."
    die_sound={SOUND_LIST:HUMAN_DIE}
{DEFENSE_ANIM "units/lighting/Noble-defence.png" "units/lighting/Noble.png" {SOUND_LIST:HUMAN_FEMALE_HIT} }
	[resistance]
        arcane=80
    [/resistance]

    [attack]
        name=slap
        description=_"slap"
        icon=attacks/staff-magic.png
        type=impact
		[specials]
			{WEAPON_SPECIAL_EMMR_DISTANT_ATTACK}
		[/specials]
        range=melee
        damage=6
        number=1
    [/attack]
	
    [attack]
        name=order
        description=_"order"
        icon=attacks/staff-magic.png
        type=arcane
        range=ranged
        damage=2
        number=5
    [/attack]
	
    [attack_anim]
        [filter_attack]
            name=slap
        [/filter_attack]
        start_time=-250
        [frame]
            image="units/lighting/Noble.png:50"
        [/frame]
        [frame]
            image="units/lighting/Noble-slap.png:[300]"
        [/frame]
        {SOUND:HIT_AND_MISS fist.ogg {SOUND_LIST:MISS} -100}
        [frame]
            image="units/lighting/Noble.png:50"
        [/frame]
    [/attack_anim]
	
	[attack_anim]
        [filter_attack]
            name=order
        [/filter_attack]
        start_time=-800
        [frame]
            image="units/lighting/Noble.png:50"
        [/frame]
        [frame]
            image="units/lighting/Noble-no[1,2].png:[200,500]"
        [/frame]
        {SOUND:HIT_AND_MISS no.wav {SOUND_LIST:MISS} -150}
        [frame]
            image="units/lighting/Noble.png:50"
        [/frame]
    [/attack_anim]
		
[/unit_type]


