#textdomain wesnoth-gce
[unit_type]
    id=EMMR_Impaler
    name= _ "Impaler"
    race=human
    gender=male
    image="units/lighting/EMMR_Impaler.png"
    hitpoints=55
    movement_type=smallfoot
    movement=5
    experience=110
    level=4
    alignment=neutral
    advances_to=EMMR_Reaper
    cost=80
    usage=fighter
    description= _ "Impaler."
    die_sound={SOUND_LIST:HUMAN_DIE}
{DEFENSE_ANIM "units/lighting/EMMR_Impaler-defend.png" "units/lighting/EMMR_Impaler.png" {SOUND_LIST:HUMAN_HIT} }
	[resistance]
        blade=80
        impact=120
        cold=90
    [/resistance]
	
	[standing_anim]
        start_time=0
        [frame]
            image="units/lighting/EMMR_Impaler-stand[1~6].png:[150*6]"
        [/frame]
    [/standing_anim]
	
	[attack]
        name=impale
        description=_"impale"
        icon=attacks/EMMR_staff-magic.png
        type=pierce
		[specials]
			{WEAPON_SPECIAL_EMMR_DISTANT_ATTACK}
		[/specials]
        range=melee
        damage=5
        number=3
    [/attack]	
	
    [attack]
        name=slice
        description=_"slice"
        icon=attacks/EMMR_staff-magic.png
        type=blade
        range=melee
        damage=11
        number=4
    [/attack]

	[attack_anim]
        [filter_attack]
            name=impale
        [/filter_attack]
        start_time=-250
        [frame]
            image="units/lighting/EMMR_Impaler.png:50"
        [/frame]
        [frame]
            image="units/lighting/EMMR_Impaler-pierce[1,2,1].png:[100*3]"
        [/frame]
        {SOUND:HIT_AND_MISS spear.ogg {SOUND_LIST:MISS} -100}
        [frame]
            image="units/lighting/EMMR_Impaler.png:50"
        [/frame]
    [/attack_anim]
	
	[attack_anim]
        [filter_attack]
            name=slice
        [/filter_attack]
        start_time=-150
        [frame]
            image="units/lighting/EMMR_Impaler.png:50"
        [/frame]
        [frame]
            image="units/lighting/EMMR_Impaler-slice1.png:[100]"
        [/frame]
        {SOUND:HIT_AND_MISS spear.ogg {SOUND_LIST:MISS} -100}
        [frame]
            image="units/lighting/EMMR_Impaler.png:50"
        [/frame]
    [/attack_anim]
		
[/unit_type]


