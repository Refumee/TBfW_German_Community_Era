    {UNIT_BODY_BATTALION_STATS_GCE    drakefoot 5 66 ( _ "touch") "attacks/touch-zombie.png" impact}
    {UNIT_BODY_BATTALION_GRAPHICS_GCE battalion-drake}
	[movement_costs]
		unwalkable=4
	[/movement_costs]
	[defense]
		unwalkable=90
	[/defense]
	[death]
		start_time=0
		[frame]
			image="units/battalion/battalion-drake-die-[1~2].png:150"
		[/frame]
		# play a fadeout animation instead
		[frame]
			image="units/battalion/battalion-drake-die-3.png:600"
			alpha=1~0
