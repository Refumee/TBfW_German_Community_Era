#textdomain wesnoth-gce

# Common statistics plus variations of some values
#define UNIT_BODY_BATTALION_STATS_GCE MOVTYPE_NAME MOVES_NUMBER HP_AMOUNT ATTACK_NAME ATTACK_ICON ATTACK_TYPE
    race=undead
    {TRAIT_FEARLESS_MUSTHAVE}
    level=4
    experience=200
    alignment=chaotic
    advances_to=null
    {AMLA_DEFAULT}
    cost=43
    usage=fighter
    description= _ "How on the earth has this one been entertained? It is not a product of necromancy, but unexpected disaster. Without horses, we couldn't escape from this disaster. Even solid armor can be blown sky-high. For this very reason, they are called Battalion and feared by everyone."
    die_sound={SOUND_LIST:ZOMBIE_HIT}
    [resistance]
        arcane=120
    [/resistance]

    movement_type={MOVTYPE_NAME}
    movement={MOVES_NUMBER}
    hitpoints={HP_AMOUNT}

    # The human-looking hand in the attack icon doesn't work well for some races, so it's
    # changeable here. The animals have no hands at all, so they get fangs. The internal
    # name can't change from touch though.
    [attack]
        name=touch
        description={ATTACK_NAME}
        icon={ATTACK_ICON}
        range=melee
        type={ATTACK_TYPE}
        damage=12
        number=5
        [specials]
            {WEAPON_SPECIAL_PLAGUE}
        [/specials]
    [/attack]
#enddef

# Variant animations for the Soulless
#define UNIT_BODY_BATTALION_GRAPHICS_GCE BASE_NAME
    image="units/battalion/{BASE_NAME}.png"
    {DEFENSE_ANIM "units/battalion/{BASE_NAME}-defend.png" "units/battalion/{BASE_NAME}.png" {SOUND_LIST:ZOMBIE_HIT} }
    [death]
        start_time=0
        [frame]
            image="units/battalion/{BASE_NAME}-die-[1~4].png:150,units/battalion/{BASE_NAME}-die-[5~10].png:150"
        [/frame]
    [/death]
    [attack_anim]
        [filter_attack]
            name=touch
        [/filter_attack]
        direction=s
        start_time=-200
        [frame]
            image="units/battalion/{BASE_NAME}-attack-s.png:400"
            sound=zombie-attack.wav
        [/frame]
    [/attack_anim]
    [attack_anim]
        [filter_attack]
            name=touch
        [/filter_attack]
        direction=n
        start_time=-200
        [frame]
            image="units/battalion/{BASE_NAME}-attack-n.png:400"
            sound=zombie-attack.wav
        [/frame]
    [/attack_anim]
    [attack_anim]
        [filter_attack]
            name=touch
        [/filter_attack]
        direction=se,sw,ne,nw
        start_time=-200
        [frame]
            image="units/battalion/{BASE_NAME}-attack.png:400"
            sound=zombie-attack.wav
        [/frame]
    [/attack_anim]
#enddef

# The death animation is different compared to mainline
#define UNIT_BODY_BATTALION_DEATH VARIATION
    [death]
        start_time=0
        [frame]
            image="units/battalion/battalion{VARIATION}-die-[1~2].png:150"
        [/frame]
        [frame]
            image="units/undead/soulless{VARIATION}-die-[3~4].png:150"
        [/frame]
        [frame]
            image="units/undead/soulless-die-[5~10].png:150"
        [/frame]
    [/death]
#enddef

# both macros together are like the mainline one
#define UNIT_BODY_BATTALION_GRAPHICS VARIATION
    {UNIT_BODY_BATTALION_GRAPHICS_GCE battalion{VARIATION}}
    {UNIT_BODY_BATTALION_DEATH {VARIATION}}
#enddef

[unit_type]
    id=GCE Battalion_Human
    name= _ "Battalion"
    profile=portraits/undead/soulless.webp
    {UNIT_BODY_BATTALION_STATS_GCE    smallfoot 5 58 ( _ "touch") "attacks/touch-zombie.png" impact}
    {UNIT_BODY_BATTALION_GRAPHICS_GCE battalion}
    [movement_costs]
        deep_water=4
    [/movement_costs]
    [defense]
        deep_water=90
    [/defense]
[/unit_type]

[unit_type]
