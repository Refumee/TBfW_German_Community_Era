	profile=portraits/undead/zombie-bat.webp
	{UNIT_BODY_WALKING_CORPSE_STATS_FOW fly 5 15 8 ( _ "fangs") "attacks/fangs-animal.png" blade}
	image="units/undead/zombie-bat-se-3.png"
