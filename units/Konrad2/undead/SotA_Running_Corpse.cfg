			hits=hit
			hit_sound_start_time=-25
			[hit_sound_frame]
				sound={SOUND_LIST:ZOMBIE_WEAK_HIT}
			[/hit_sound_frame]
		[/else]
		[if]
			direction=s,sw,se
			[frame]
				image="units/running/running-bat-se-[3,4,3].png:[1,250,1]"
			[/frame]
		[/if]
		[else]
