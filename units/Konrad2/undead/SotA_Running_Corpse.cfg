#textdomain wesnoth-gce

# Common statistics plus variations of some values
#define UNIT_BODY_RUNNING_CORPSE_STATS_GCE MOVTYPE_NAME MOVES_NUMBER HP_AMOUNT ATTACK_NAME ATTACK_ICON ATTACK_TYPE
	race=undead
	{TRAIT_FEARLESS_MUSTHAVE}
	level=2
	experience=80
	alignment=chaotic
	cost=23
	usage=fighter
	description= _ "Most of corpses animated by Necromancer are slow of movement. But only a few corpses, who have escaped death for a long time and chanced on many meals, regains freshness and can run again. It is difficult to escape from them, so still many living beings will become food for them."
	die_sound={SOUND_LIST:ZOMBIE_HIT}
	[resistance]
		arcane=120
	[/resistance]

	movement_type={MOVTYPE_NAME}
	movement={MOVES_NUMBER}
	hitpoints={HP_AMOUNT}

	# The human-looking hand in the attack icon doesn't work well for some races, so it's
	# changeable here. The animals have no hands at all, so they get fangs. The internal
	# name can't change from touch though.
	[attack]
		name=touch
		description={ATTACK_NAME}
		icon={ATTACK_ICON}
		range=melee
		type={ATTACK_TYPE}
		damage=7
		number=4
		[specials]
			{WEAPON_SPECIAL_PLAGUE}
		[/specials]
	[/attack]
#enddef

# Variant animations for the Soulless
#define UNIT_BODY_RUNNING_CORPSE_GRAPHICS_GCE BASE_NAME
	image="units/running/{BASE_NAME}.png"
	{DEFENSE_ANIM "units/running/{BASE_NAME}-defend.png" "units/running/{BASE_NAME}.png" {SOUND_LIST:ZOMBIE_HIT} }
	[death]
		start_time=0
		[frame]
			image="units/running/{BASE_NAME}-die-[1~4].png:150,units/running/{BASE_NAME}-die-[5~10].png:150"
		[/frame]
	[/death]
	[attack_anim]
		[filter_attack]
			name=touch
		[/filter_attack]
		direction=s
		start_time=-200
		[frame]
			image="units/running/{BASE_NAME}-attack-s.png:400"
			sound=zombie-attack.wav
		[/frame]
	[/attack_anim]
	[attack_anim]
		[filter_attack]
			name=touch
		[/filter_attack]
		direction=n
		start_time=-200
		[frame]
			image="units/running/{BASE_NAME}-attack-n.png:400"
			sound=zombie-attack.wav
		[/frame]
	[/attack_anim]
	[attack_anim]
		[filter_attack]
			name=touch
		[/filter_attack]
		direction=se,sw,ne,nw
		start_time=-200
		[frame]
			image="units/running/{BASE_NAME}-attack.png:400"
			sound=zombie-attack.wav
		[/frame]
	[/attack_anim]
#enddef

# The death animation is different compared to mainline
#define UNIT_BODY_RUNNING_CORPSE_DEATH VARIATION
	[death]
		start_time=0
		[frame]
			image="units/running/running{VARIATION}-die-[1~2].png:150"
		[/frame]
		[frame]
			image="units/undead/soulless{VARIATION}-die-[3~4].png:150"
		[/frame]
		[frame]
			image="units/undead/soulless-die-[5~10].png:150"
		[/frame]
	[/death]
#enddef

# both macros together are like the mainline one
#define UNIT_BODY_RUNNING_CORPSE_GRAPHICS VARIATION
	{UNIT_BODY_RUNNING_CORPSE_GRAPHICS_GCE running{VARIATION}}
	{UNIT_BODY_RUNNING_CORPSE_DEATH {VARIATION}}
#enddef

[unit_type]
	id=GCE Running Corpse_Human
	name= _ "Running Corpse"
	advances_to=GCE Brain Eater_Human
	profile=portraits/undead/soulless.webp
	{UNIT_BODY_RUNNING_CORPSE_STATS_GCE	smallfoot 5 43 ( _ "touch") "attacks/touch-zombie.png" impact}
	{UNIT_BODY_RUNNING_CORPSE_GRAPHICS_GCE running}
	[movement_costs]
		deep_water=4
	[/movement_costs]
	[defense]
		deep_water=90
	[/defense]
[/unit_type]

[unit_type]
