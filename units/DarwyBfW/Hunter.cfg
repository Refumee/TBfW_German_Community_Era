#textdomain wesnoth-gce

[unit_type]
    id=Elvish Hunter
    name= _ "Elvish Hunter"
    race=elf
    gender=male,female
    image="units/elves-wood/hunter.png"
    hitpoints=30
    movement_type=woodland
    movement=6
    cost=16
    experience=42
    level=1
    alignment=neutral
    advances_to=Elvish Trapper
    usage=mixed fighter
    [movement_costs]
        cave=2
    [/movement_costs]
    # These guys have a better defense in swamp water and sands
    [defense]
        swamp_water=60
        cave=50
        mountains=30
        hills=40
        sand=60
    [/defense]
    description= _ "In order to protect their lands, the forest elves of the Valley of Elynia have developed new practices and formed special trained groups to patrol their frontiers. Their hunters are specialized in trapping unwary opponents from a safe distance to ease the task of the swordsmen."+{SPECIAL_NOTES}+{SPECIAL_NOTES_SLOW}
    die_sound={SOUND_LIST:ELF_HIT}
    {DEFENSE_ANIM_RANGE "units/elves-wood/hunter-sword-defend.png" "units/elves-wood/hunter.png" {SOUND_LIST:ELF_HIT} melee }
    {DEFENSE_ANIM_RANGE "units/elves-wood/hunter-ranged-defend.png" "units/elves-wood/hunter-ranged-4.png" {SOUND_LIST:ELF_HIT} ranged }
    {DEFENSE_ANIM "units/elves-wood/hunter-defend.png" "units/elves-wood/hunter.png" {SOUND_LIST:ELF_HIT} }
    [attack]
        name=sword
        #textdomain wesnoth-units
        description= _"sword"
        #textdomain wesnoth-gce
        type=blade
        range=melee
        damage=5
        number=4
        icon=attacks/sword-elven.png
    [/attack]
    [attack]
        name=bolas
        description= _"bolas"
        type=impact
        range=ranged
        damage=4
        number=2
        [specials]
            {WEAPON_SPECIAL_SLOW}
        [/specials]
    [/attack]
    [attack_anim]
        [filter_attack]
            name=bolas
        [/filter_attack]
        missile_start_time=-150
        [missile_frame]
            duration=150
            image=projectiles/bolas-n.png
            image_diagonal=projectiles/bolas-ne.png
        [/missile_frame]
        start_time=-500
        [frame]
            image="units/elves-wood/hunter-ranged-[1~4].png:[125*4]"
        [/frame]
        {SOUND:HIT_AND_MISS hatchet.wav hatchet-miss.wav -375}
    [/attack_anim]

    [attack_anim]
        [filter_attack]
            name=sword
        [/filter_attack]
        start_time=-200
        [frame]
            image="units/elves-wood/hunter.png:25"
        [/frame]
        [frame]
            image="units/elves-wood/hunter-sword-[1~4].png:[100,150,50*2]"
        [/frame]
        [frame]
            image="units/elves-wood/hunter.png:25"
        [/frame]
        {SOUND:HIT_AND_MISS {SOUND_LIST:SWORD_SWISH} {SOUND_LIST:MISS} -75}
    [/attack_anim]
    [female]
        name= _ "female^Elvish Hunter"
        gender=female
        image="units/elves-wood/hunter+female.png"
        die_sound={SOUND_LIST:ELF_FEMALE_HIT}
        {DEFENSE_ANIM_RANGE "units/elves-wood/hunter+female-sword-defend.png" "units/elves-wood/hunter+female.png" {SOUND_LIST:ELF_FEMALE_HIT} melee }
        {DEFENSE_ANIM_RANGE "units/elves-wood/hunter+female-ranged-defend.png" "units/elves-wood/hunter+female-ranged-4.png" {SOUND_LIST:ELF_FEMALE_HIT} ranged }
        [attack_anim]
            [filter_attack]
                name=bolas
            [/filter_attack]
            missile_start_time=-150
            [missile_frame]
                duration=150
                image=projectiles/bolas-n.png
                image_diagonal=projectiles/bolas-ne.png
            [/missile_frame]
            start_time=-500
            [frame]
                image="units/elves-wood/hunter+female-ranged-[1~4].png:[125*4]"
            [/frame]
        [/attack_anim]
        [attack_anim]
            [filter_attack]
                name=sword
            [/filter_attack]
            start_time=-200
            [frame]
                image="units/elves-wood/hunter+female.png:25"
            [/frame]
            [frame]
                image="units/elves-wood/hunter+female-sword-[1~4].png:[100,150,50*2]"
            [/frame]
            [frame]
                image="units/elves-wood/hunter+female.png:25"
            [/frame]
        [/attack_anim]
    [/female]
[/unit_type]
