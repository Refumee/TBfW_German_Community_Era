#textdomain wesnoth-gce
[unit_type]
	id=Elvish Arbiter GCE
	name= _ "Elvish Arbiter"
	race=elf
	image="units/elves-wood/halberdier.png"
	profile="portraits/elves/halberdier.png"
	hitpoints=70
	movement_type=woodland
	movement=5
	{LESS_NIMBLE_ELF}
	experience=150
	level=3
	alignment=neutral
	advances_to=null
	{AMLA_DEFAULT}
	cost=55
	usage=fighter
	description= _ "He who thinks their natural grace would deter elves from stabbing and slicing foes with a halberd, has been misled. They are swift to learn and skills once acquired do not fade for lack of practice."
	die_sound={SOUND_LIST:ELF_HIT}
	[attack]
		name=halberd2
		description=_"halberd"
		icon=attacks/halberd.png
		type=pierce
		range=melee
		damage=15
		number=3
		[specials]
			{WEAPON_SPECIAL_FIRSTSTRIKE}
		[/specials]
	[/attack]
	[attack]
		name=halberd1
		description=_"halberd"
		icon=attacks/halberd.png
		type=blade
		range=melee
		damage=10
		number=4
	[/attack]
	{DEFENSE_ANIM "units/elves-wood/halberdier-defend.png" "units/elves-wood/halberdier.png" {SOUND_LIST:ELF_HIT} }
	[attack_anim]
		[filter_attack]
			name=halberd2
		[/filter_attack]
		hits=yes
		[frame]
			begin=-445
			end=-380
			image="units/elves-wood/halberdier-attack-2-1.png"
		[/frame]
		[frame]
			begin=-380
			end=-305
			image="units/elves-wood/halberdier-attack-2-1.png"
			sound=spear.ogg
		[/frame]
		[frame]
			begin=-305
			end=-230
			image="units/elves-wood/halberdier-attack-2-1.png"
		[/frame]
		[frame]
			begin=-230
			end=-130
			image="units/elves-wood/halberdier-attack-2-2.png"
		[/frame]
		[frame]
			begin=-130
			end=0
			image="units/elves-wood/halberdier-attack-2-2.png"
		[/frame]
		[frame]
			begin=0
			end=65
			image="units/elves-wood/halberdier-attack-2-2.png"
		[/frame]
	[/attack_anim]
	[attack_anim]
		[filter_attack]
			name=halberd2
		[/filter_attack]
		hits=no
		[frame]
			begin=-445
			end=-380
			image="units/elves-wood/halberdier.png"
		[/frame]
		[frame]
			begin=-380
			end=-305
			image="units/elves-wood/halberdier-attack-2-1.png"
			sound=spear-miss.ogg
		[/frame]
		[frame]
			begin=-305
			end=-230
			image="units/elves-wood/halberdier-attack-2-1.png"
		[/frame]
		[frame]
			begin=-230
			end=-130
			image="units/elves-wood/halberdier-attack-2-2.png"
		[/frame]
		[frame]
			begin=-130
			end=0
			image="units/elves-wood/halberdier-attack-2-2.png"
		[/frame]
		[frame]
			begin=0
			end=65
			image="units/elves-wood/halberdier-attack-2-2.png"
		[/frame]
	[/attack_anim]
	[attack_anim]
		[filter_attack]
			name=halberd1
		[/filter_attack]
		[frame]
			begin=-200
			end=-175
			image="units/elves-wood/halberdier.png"
		[/frame]
		[frame]
			begin=-175
			end=-125
			image="units/elves-wood/halberdier-attack-1-1.png"
		[/frame]
		[frame]
			begin=-125
			end=-75
			image="units/elves-wood/halberdier-attack-1-1.png"
		[/frame]
		[if]
			hits=yes
			[frame]
				begin=-75
				end=75
				image="units/elves-wood/halberdier-attack-1-2.png"
				sound=axe.ogg
			[/frame]
		[/if]
		[else]
			hits=no
			[frame]
				begin=-75
				end=75
				image="units/elves-wood/halberdier-attack-1-2.png"
				sound={SOUND_LIST:MISS}
			[/frame]
		[/else]
		[frame]
			begin=75
			end=125
			image="units/elves-wood/halberdier-attack-1-2.png"
		[/frame]
		[frame]
			begin=125
			end=175
			image="units/elves-wood/halberdier-attack-1-2.png"
		[/frame]
		[frame]
			begin=175
			end=200
			image="units/elves-wood/halberdier.png"
		[/frame]
	[/attack_anim]
[/unit_type]
