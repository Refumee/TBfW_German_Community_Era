#textdomain wesnoth-gce
[unit_type]
    id=Naga Initiate
    name= _ "Naga Initiate"
    race=naga
    gender=female
    image="units/nagas/initiate.png"
    ellipse="misc/ellipse"
    profile=portraits/nagas/fighter.png
    hitpoints=33
    movement_type=naga
    movement=7
    experience=32
    level=1
    alignment=neutral
    advances_to=Naga Maiden,Naga Adept
    cost=14
    usage=fighter
    description= _ "The serpentine naga are one of the few races capable of any meaningful mobility in water, giving them mastery of a whole world effectively forbidden to land dwellers. Still, they are not true creatures of the sea, and their inability to breathe water leaves them in trepidation of the abyss. They are small, and somewhat frail in form, but often much more nimble than their opponents."
    die_sound=naga-die.ogg
    {DEFENSE_ANIM "units/nagas/initiate-defend-1.png" "units/nagas/initiate-defend-2.png" {SOUND_LIST:NAGA_HIT} }
    [attack]
        name=staff
        description=_"staff"
        icon=attacks/staff-magic.png
        type=impact
        range=melee
        damage=7
        number=1
    [/attack]
    [attack]
        name=water spray
        description=_"water spray"
        icon=attacks/waterspray.png
        type=impact
        range=ranged
        [specials]
            {WEAPON_SPECIAL_MAGICAL}
        [/specials]
        damage=8
        number=2
    [/attack]
    [attack_anim]
        [filter_attack]
            name=water spray
        [/filter_attack]
        start_time=-420

        [missile_frame]
            begin=-165
            end=0
            image="projectiles/water-spray.png"
            image_diagonal="projectiles/water-spray.png"
        [/missile_frame]
        {MERMAID_WATER_BLAST_HALO}
        {MERMAID_STAFF_FLARE 16 -12}

        [frame]
            duration=70
            image="units/nagas/initiate-magic-1.png"
        [/frame]
        [frame]
            duration=230
            image="units/nagas/initiate-magic-2.png"
        [/frame]
        [frame]
            duration=50
            image="units/nagas/initiate-magic-2.png"
            sound=water-blast.wav
        [/frame]
        [frame]
            duration=80
            image="units/nagas/initiate-magic-1.png"
        [/frame]
    [/attack_anim]
    [attack_anim]
        [filter_attack]
            name=staff
        [/filter_attack]
        start_time=-250
        [frame]
            duration=50
            image="units/nagas/initiate.png"
        [/frame]
        [frame]
            duration=100
            image="units/nagas/initiate-staff-attack-1.png"
        [/frame]
        [if]
            hits=yes
            [frame]
                duration=200
                image="units/nagas/initiate-staff-attack-2.png"
                sound=staff.wav
            [/frame]
        [/if]
        [else]
            hits=no
            [frame]
                duration=200
                image="units/nagas/initiate-staff-attack-2.png"
                sound={SOUND_LIST:MISS}
            [/frame]
        [/else]
        [frame]
            duration=50
            image="units/nagas/initiate-magic-1.png"
        [/frame]
        [frame]
            duration=50
            image="units/nagas/initiate.png"
        [/frame]
    [/attack_anim]

    [female]
        name= _ "Nagini Initiate"
        gender=female
    [/female]

[/unit_type]
