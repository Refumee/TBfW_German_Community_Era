#textdomain wesnoth-gce
[unit_type]
	id=Elvish Spearman GCE
	name= _ "Elvish Spearman"
	race=elf
	image="units/elves-wood/spearman.png"
	gender=male
	profile="portraits/elves/spearman.png"
	hitpoints=33
	movement_type=woodland
	{LESS_NIMBLE_ELF}
	movement=5
	experience=40
	level=1
	alignment=neutral
	advances_to=Elvish Pikeman GCE
	cost=15
	usage=fighter
	description= _ "He who thinks their reputation for archery would deter elves from stabbing foes with a spear, is overly idealistic. They are swift to learn and skills once acquired do not fade for lack of practice."
	die_sound={SOUND_LIST:ELF_HIT}
	[attack]
		name=spear
		description=_"spear"
		icon=attacks/spear.png
		type=pierce
		range=melee
		damage=7
		number=3
		[specials]
			{WEAPON_SPECIAL_FIRSTSTRIKE}
		[/specials]
	[/attack]
	{DEFENSE_ANIM "units/elves-wood/spearman-defend.png" "units/elves-wood/spearman.png" {SOUND_LIST:ELF_HIT} }
	[attack_anim]
		[filter_attack]
			name=spear
		[/filter_attack]
		[frame]
			begin=-300
			end=-230
			image="units/elves-wood/spearman.png"
		[/frame]		
		[frame]
			begin=-230
			end=-175
			image="units/elves-wood/spearman.png"
		[/frame]		
		[frame]
			begin=-175
			end=-100
			image="units/elves-wood/spearman-attack.png"
		[/frame]
		[if]
			hits=yes
			[frame]
				begin=-100
				end=100
				image="units/elves-wood/spearman-attack.png"
				sound=spear.ogg
			[/frame]
		[/if]
		[else]
			hits=no
			[frame]
				begin=-100
				end=100
				image="units/elves-wood/spearman-attack.png"
				sound=spear-miss.ogg
			[/frame]
		[/else]
		[frame]
			begin=100
			end=150
			image="units/elves-wood/spearman-attack.png"
		[/frame]
		[frame]
			begin=150
			end=175
			image="units/elves-wood/spearman.png"
		[/frame]
	[/attack_anim]
[/unit_type]
