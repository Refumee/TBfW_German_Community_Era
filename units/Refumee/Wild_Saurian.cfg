#textdomain wesnoth-gce

[unit_type]
	id=GCE Wild Saurian
	name= _ "Wild Saurian"
	race=lizard
	gender=female
	image=units/saurians/wild.png
	hitpoints=37
	movement_type=lizard
	movement=6
	level=2
	alignment=chaotic
	advances_to=GCE Beast Saurian
	experience=85
	cost=26
	usage=fighter
	description= _ "Some saurians are more savage and have a greater predatory instinct. They often live alone and have developed a peculiar ability to heal themselves from wounds and poisons."
	{DEFENSE_ANIM "units/saurians/wild-defend-2.png" "units/saurians/wild-defend-1.png" hiss-hit.wav }
	die_sound=hiss-die.wav
	[abilities]
		{ABILITY_SELF_HEAL}
		{ABILITY_SWAMP_LURK}
	[/abilities]

	[attack]
		name=sickle
		description= _"sickle"
		type=blade
		range=melee
		damage=7
		number=4
		icon=attacks/sickle.png
	[/attack]

	[attack]
		name=curse
		description=_"curse"
		type=cold
		[specials]
			{WEAPON_SPECIAL_MAGICAL}
		[/specials]
		range=ranged
		damage=5
		number=3
		icon=attacks/curse.png
	[/attack]

	[attack_anim]
		[filter_attack]
			name=curse
		[/filter_attack]
		{MISSILE_FRAME_ICE}
		[frame]
			image=units/saurians/wild-defend-[1,2,1].png:100
		[/frame]
		{HALO_FRAME_SAURIAN}
	[/attack_anim]
	[standing_anim]
		start_time=0
		[frame]
			image=units/saurians/wild-bob[1~6].png:200
		[/frame]
	[/standing_anim]
	[attack_anim]
		[filter_attack]
			name=sickle
		[/filter_attack]
		start_time=-200
		[frame]
			image="units/saurians/wild.png:300"
		[/frame]
		{SOUND:HIT_AND_MISS axe.ogg {SOUND_LIST:MISS} -50}
	[/attack_anim]
[/unit_type]
