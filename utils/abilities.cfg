###################################################################### SUMMON GOLEM ABILITIES ##########################################################

#define SUMMON_MENU_ITEM ID DESCRIPTION COST ABILITY UNIT
	[set_menu_item]
		id=summon_{ID}
		description={DESCRIPTION}
		[show_if]
		[/show_if]

		[filter_location]
			[filter_adjacent_location]
				[filter]
					ability={ABILITY}
					side=$side_number
					[filter_wml]
						moves=$this_unit.max_moves
					[/filter_wml]
					[filter_location]
						[not]
							terrain=C*,K*
						[/not]
					[/filter_location]
				[/filter]
			[/filter_adjacent_location]
			[not]
				[filter]
				[/filter]
				[or]
					terrain=_off^_usr,Q*,W*,*^X*,X*,*^V*
				[/or]
			[/not]
		[/filter_location]
		[command]
			[store_gold]
				variable=actualgold
				side=$side_number
			[/store_gold]
			[if]
				[variable]
					name=actualgold
					greater_than_equal_to={COST}
				[/variable]
				[then]
					[gold]
						amount=-{COST}
						side=$side_number
					[/gold]
					[unit]
						type={UNIT}
						side=$side_number
						x,y=$x1,$y1
						moves=0
						animate=yes
					[/unit]
					[store_unit]
						variable=newunit
						[filter]
							x,y=$x1,$y1
						[/filter]
					[/store_unit]
					[set_variable]
						name=newunit.attacks_left
						value=0
					[/set_variable]
					[unstore_unit]
						variable=newunit
						find_vacant=no
					[/unstore_unit]
					[set_variable]
						name=newunit.moves
						value=0
					[/set_variable]
					[store_unit]
						[filter]
							ability={ABILITY}
							side=$side_number
							[filter_wml]
								moves=$this_unit.max_moves
							[/filter_wml]
							[filter_adjacent]
								x,y=$x1,$y1
							[/filter_adjacent]
						[/filter]
						variable=able_to_summon
					[/store_unit]

					[set_variable]
						name=able_to_summon[0].attacks_left
						value=0
					[/set_variable]
					[set_variable]
						name=able_to_summon[0].moves
						value=0
					[/set_variable]

					#{VARIABLE_OP able_to_summon[0].experience add 3}

					[unstore_unit]
						variable=able_to_summon[0]
						find_vacant=no
						#	text= _ "+$this_unit.level exp"
						#	red,green,blue=50,50,200
					[/unstore_unit]
					{CLEAR_VARIABLE newunit}
					{CLEAR_VARIABLE able_to_summon}
				[/then]
				[else]
					[message]
						speaker=narrator
						side_for=$side_number
						caption=_ "Error"
						message= _ "I have insufficient materials. I am unable to summon."
						image=wesnoth-icon.png
					[/message]
				[/else]
			[/if]
			{CLEAR_VARIABLE actualgold}
		[/command]
	[/set_menu_item]
	####
	####
	[set_menu_item]
		id=summon_zhelp
		description= _ "Summoning - help"
		[show_if]
		[/show_if]

		[filter_location]
			[filter]
				type=FLDwiz2,FLDwiz3,FLDwladcaz,FLDskalnym
				side=$side_number
			[/filter]
		[/filter_location]
		[command]
			[message]
				speaker=narrator
				side_for=$side_number
				caption=_ "Help"
				message= _ "To summon a unit right-click on a free hex next to your summoner. You need all your move points and attacks to summon a unit. Summoning doesnt work in castles. New unit cant be summoned in water."
				image=wesnoth-icon.png
			[/message]
		[/command]
	[/set_menu_item]
#enddef

#define ABILITY_SUMMON_GOLEM
	[dummy]
		id=summon_golem
		name= _ "create a golem"
		description= _ "This unit can create golems, but not in villages."
	[/dummy]
	# wmllint: unbalanced-on
	# wmlxgettext: [abilities]
[/abilities]

[event]
	name=start
	[if]
		[have_unit]
			ability=summon_golem
		[/have_unit]
		[then]
			{SUMMON_GOLEM_MENU}
		[/then]
	[/if]
[/event]

[event]
	name=recruit
	[filter]
		ability=summon_golem
	[/filter]
	{SUMMON_GOLEM_MENU}
[/event]

[event]
	name=post_advance
	[filter]
		ability=summon_golem
	[/filter]
	{SUMMON_GOLEM_MENU}
[/event]

[+abilities]
	# wmlxgettext: [/abilities]
	# wmllint: unbalanced-off
#enddef

#define SUMMON_GOLEM_MENU
	{SUMMON_MENU_ITEM golem_menu ( _ "Create a golem (16 Gold)") 16 summon_golem (FLDgolem)}
#enddef