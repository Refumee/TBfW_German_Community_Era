#define EMMR_SEDUCE
[event]
	name=attack
	first_time_only=no
	
	[filter_attack]
		special=weapon_charm2
	[/filter_attack]
	
	[store_unit]
		[filter]
			x,y=$x1,$y1
		[/filter]
		variable=unit_att_with_charm
		mode=append
	[/store_unit]	
	[set_variable]
		name=unit_att_with_charm.variables.charm_has_worked
		value=no
	[/set_variable]	
	[unstore_unit]
		variable=unit_att_with_charm
	[/unstore_unit]
	
	{CLEAR_VARIABLE unit_att_with_charm}
[/event]


# event that creates a "charm has worked" variable
# and sets it to "yes" if the attacker hits at least once.
[event]
	name=attacker_hits
	first_time_only=no
	
	[filter_attack]
		special=weapon_charm2
	[/filter_attack]
	
	[store_unit]
		[filter]
			x,y=$x1,$y1
		[/filter]
		variable=unit_att_with_charm
		mode=append
	[/store_unit]
	[set_variable]
		name=unit_att_with_charm.variables.charm_has_worked
		value=yes
	[/set_variable]
	[unstore_unit]
		variable=unit_att_with_charm
	[/unstore_unit]
	
	{CLEAR_VARIABLE unit_att_with_charm}
[/event]


# event that shifts a unit to the other side
# if the defending unit
#	   - was not lvl1 or lvl0 
#	   - and was not a recruiting unit 
#	   - and was a not a "non-living" creature
# then :
# -> if the attacker hit once at least, the defender goes to the attacker side.
[event]
	name=attacker hits
	first_time_only=no
	
	[filter_attack]
		special=weapon_charm2
	[/filter_attack]
	[filter_second]
		canrecruit=no
		[and]
			[not]
			[filter_wml]
				[status]
					not_living=yes
				[/status]
			[/filter_wml]
			[/not]
		[/and]
		[and]
		gender=male
		[/and]
	[/filter_second]


	[store_unit]
		[filter]
			x,y=$x1,$y1
		[/filter]
		variable=charmer
		mode=append
	[/store_unit]
	
	[store_unit]
		[filter]
			x,y=$x2,$y2
		[/filter]
		variable=charmed
		mode=append
	[/store_unit]
	
	[if]
		[variable]
			name=charmer.variables.charm_has_worked
			equals=no
		[/variable]
		[then]
			[unstore_unit]
				variable=charmer
				text=" "
				{COLOR_HARM}
			[/unstore_unit]
		[/then]
		[else]
					
			[set_variable]
				name=charmed.side
				value=$charmer.side
			[/set_variable]
			[unstore_unit]
				variable=charmed
				text=" "
 				{COLOR_HEAL}
			[/unstore_unit]				
	[/else]
	[/if]

	{CLEAR_VARIABLE charmer}
	{CLEAR_VARIABLE charmed}
[/event]
#enddef

#define ABILITY_EMMR_PRINCESS_LEADERSHIP
	# Canned definition of the Leadership ability to be included in an
	# [abilities] clause.
	[leadership]
		id=leadership
		value="5"
		cumulative=no
		name= _ "leadership"
		female_name= _ "female^leadership"
		description= _ "This unit can lead your own units that are next to it, making them fight better.

Adjacent own units will do more damage in battle. When a unit adjacent to and on the same side as a unit with Leadership engages in combat, its attacks do 5% more damage."
		affect_self=no
	   [affect_adjacent]		 
	   [/affect_adjacent]
	[/leadership]
#enddef

