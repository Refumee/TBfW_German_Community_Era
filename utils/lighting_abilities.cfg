#define ABILITY_EMMR_DOCTOR
	# A doc can heal you.
	[heals]
		value=2
		id=doctor
		affect_allies=yes
		name= _ "heals +2"
		female_name= _ "female^heals +2"
		description=  _ "Allows the unit to heal adjacent allied units at the beginning of our turn.

A unit cared for by this doctor may heal up to 2 HP per turn, or heal poison."
		affect_self=no
		poison=cured
		[affect_adjacent]
		[/affect_adjacent]
	[/heals]
#enddef

