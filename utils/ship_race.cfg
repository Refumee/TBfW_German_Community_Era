    [movetype]
        name=ship
        flying=yes # not really flying, it just keeps the sprite baseline from shifting up/down on different terrains
        [movement_costs]
            deep_water=1
            shallow_water=2
            swamp_water=2
            reef=3
            village=1
        [/movement_costs]
        [defense]
            deep_water=60
            shallow_water=70
            swamp_water=80
            reef=90
        [/defense]
        [resistance]
            blade=100
            pierce=100
            impact=110
            fire=130
            cold=70
            arcane=40
        [/resistance]
    [/movetype]

#define SHIP_NAMES
    # po: Generator for ship names
